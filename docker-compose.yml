services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: factory_floor
      POSTGRES_USER: factory_floor
      POSTGRES_PASSWORD: factory_floor_dev_password
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U factory_floor -d factory_floor"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-06-13T11-33-47Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: factoryfloor
      MINIO_ROOT_PASSWORD: factoryfloor_dev_password
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
