services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-factory_floor}
      POSTGRES_USER: ${POSTGRES_USER:-factory_floor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-factory_floor_dev_password}
    ports:
      - "${FACTORY_FLOOR_POSTGRES_BIND:-127.0.0.1}:${FACTORY_FLOOR_POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-06-13T11-33-47Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-factoryfloor}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-factoryfloor_dev_password}
    ports:
      - "${FACTORY_FLOOR_MINIO_BIND:-127.0.0.1}:${FACTORY_FLOOR_MINIO_API_PORT:-9000}:9000"
      - "${FACTORY_FLOOR_MINIO_BIND:-127.0.0.1}:${FACTORY_FLOOR_MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
