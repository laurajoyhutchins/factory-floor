apiVersion: factory-floor.dev/v1alpha1
kind: ArtifactSchema
metadata: { name: objective, version: v1 }
spec:
  schema:
    $schema: https://json-schema.org/draft/2020-12/schema
    type: object
    additionalProperties: false
    required: [query, sources]
    properties:
      query: { type: string, minLength: 1 }
      sources:
        type: array
        minItems: 3
        items: { type: string, minLength: 1 }
---
apiVersion: factory-floor.dev/v1alpha1
kind: ArtifactSchema
metadata: { name: evidence, version: v1 }
spec:
  schema:
    $schema: https://json-schema.org/draft/2020-12/schema
    type: object
    additionalProperties: false
    required: [evidence]
    properties:
      evidence:
        type: array
        minItems: 1
        items:
          type: object
          additionalProperties: true
          required: [source, query, title, claim, rank]
          properties:
            source: { type: string }
            query: { type: string }
            title: { type: string }
            claim: { type: string }
            rank: { type: integer }
---
apiVersion: factory-floor.dev/v1alpha1
kind: ArtifactSchema
metadata: { name: candidate-claims, version: v1 }
spec:
  schema:
    $schema: https://json-schema.org/draft/2020-12/schema
    type: object
    additionalProperties: false
    required: [comparisons]
    properties:
      comparisons:
        type: array
        minItems: 3
        items: { type: object, additionalProperties: true }
---
apiVersion: factory-floor.dev/v1alpha1
kind: ArtifactSchema
metadata: { name: verification-result, version: v1 }
spec:
  schema:
    $schema: https://json-schema.org/draft/2020-12/schema
    type: object
    additionalProperties: true
    required: [passed, attemptNumber, checks]
    properties:
      passed: { type: boolean }
      attemptNumber: { type: integer, minimum: 1 }
      checks: { type: array }
---
apiVersion: factory-floor.dev/v1alpha1
kind: ArtifactSchema
metadata: { name: result, version: v1 }
spec:
  schema:
    $schema: https://json-schema.org/draft/2020-12/schema
    type: object
    additionalProperties: true
    required: [summary, findings, generatedBy]
    properties:
      summary: { type: string }
      findings: { type: array }
      generatedBy: { const: demo-ts@synthesize@1 }
---
apiVersion: factory-floor.dev/v1alpha1
kind: ArtifactSchema
metadata: { name: evidence-bundle, version: v1 }
spec:
  schema:
    $schema: https://json-schema.org/draft/2020-12/schema
    type: object
    additionalProperties: true
    required: [evidence, generatedBy]
    properties:
      evidence: { type: array }
      generatedBy: { const: demo-ts@synthesize@1 }
---
apiVersion: factory-floor.dev/v1alpha1
kind: ArtifactSchema
metadata: { name: uncertainty-report, version: v1 }
spec:
  schema:
    $schema: https://json-schema.org/draft/2020-12/schema
    type: object
    additionalProperties: true
    required: [uncertainties, complete, generatedBy]
    properties:
      uncertainties: { type: array }
      complete: { type: boolean }
      generatedBy: { const: demo-ts@synthesize@1 }
---
apiVersion: factory-floor.dev/v1alpha1
kind: ArtifactSchema
metadata: { name: failure-artifact, version: v1 }
spec:
  schema:
    $schema: https://json-schema.org/draft/2020-12/schema
    type: object
    additionalProperties: true
    required: [code, message, retryable]
    properties:
      code: { type: string }
      message: { type: string }
      retryable: { type: boolean }
