[project]
name = "factory-floor-worker-sdk"
version = "0.1.0"
description = "Python worker SDK for the Factory Floor worker protocol."
readme = "README.md"
requires-python = ">=3.12,<3.13"
dependencies = ["factory-floor-contracts", "httpx>=0.28,<0.29"]

[dependency-groups]
dev = ["pytest>=8.4,<9", "pytest-asyncio>=1.2,<2"]

[tool.uv]
package = false

[tool.pytest.ini_options]
pythonpath = ["src", "../../workers/demo-py/src"]
testpaths = ["tests", "../../workers/demo-py/tests"]

[tool.uv.sources]
factory-floor-contracts = { path = "../contracts-py", editable = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/factory_floor_worker_sdk"]
