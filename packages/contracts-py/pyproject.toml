[project]
name = "factory-floor-contracts"
version = "0.1.0"
description = "Generated Python Pydantic contract models for Factory Floor."
readme = "README.md"
requires-python = ">=3.12,<3.13"
dependencies = ["pydantic>=2.13,<3"]

[dependency-groups]
dev = ["datamodel-code-generator>=0.68,<0.69", "pytest>=8.4,<9"]

[tool.uv]
package = true

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["factory_floor_contracts"]

[tool.hatch.build]
include = ["factory_floor_contracts/**/*.py"]
