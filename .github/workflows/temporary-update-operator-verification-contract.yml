name: Temporary operator verification contract update

on:
  pull_request:

permissions:
  contents: write

jobs:
  update-contract:
    if: github.head_ref == 'refactor/extract-operator-packages'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: refactor/extract-operator-packages
          fetch-depth: 0

      - name: Update verification invariant
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('scripts/verification.test.mjs')
          text = path.read_text()
          start = text.index("  it('discovers unit tests and preserves the console test project'")
          end = text.index("\n\n  it('maps package verification commands", start)
          replacement = """  it('discovers unit tests and preserves browser test projects', () => {
            const projects = rootVitestConfig.test.projects;
            const rootProject = projects.find(
              (project) => typeof project === 'object' && project !== null,
            );

            expect(projects).toEqual(
              expect.arrayContaining([
                'apps/console/vitest.config.ts',
                'packages/operator-ui-react/vitest.config.ts',
              ]),
            );
            expect(rootProject.test.include).toEqual(
              expect.arrayContaining([
                'apps/**/*.test.ts',
                'apps/**/*.test.tsx',
                'packages/**/*.test.ts',
                'packages/**/*.test.tsx',
                'workers/**/*.test.ts',
                'workers/**/*.test.tsx',
                'scripts/**/*.test.mjs',
              ]),
            );
            expect(rootProject.test.include).not.toEqual(
              expect.arrayContaining([
                'tests/**/*.test.ts',
                'tests/integration/**/*.test.ts',
                'tests/acceptance/**/*.test.ts',
              ]),
            );
            expect(rootProject.test.exclude).toEqual(
              expect.arrayContaining([
                'tests/**',
                '**/node_modules/**',
                '**/dist/**',
                '**/build/**',
                '**/coverage/**',
                '**/generated/**',
                'apps/console/**',
                'packages/operator-ui-react/**',
              ]),
            );
            const consoleVitestConfig = read('apps/console/vitest.config.ts');
            const operatorUiVitestConfig = read(
              'packages/operator-ui-react/vitest.config.ts',
            );
            for (const config of [consoleVitestConfig, operatorUiVitestConfig]) {
              expect(config).toContain("environment: 'jsdom'");
              expect(config).toContain("setupFiles: ['./src/test/setup.ts']");
            }
            expect(
              existsSync(
                new URL(
                  '../packages/operator-ui-react/src/pages/pages.test.tsx',
                  import.meta.url,
                ),
              ),
            ).toBe(true);
          });"""
          path.write_text(text[:start] + replacement + text[end:])
          PY

      - name: Commit invariant update
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/verification.test.mjs
          git commit -m 'test: recognize reusable operator UI verification'
          git push origin HEAD:refactor/extract-operator-packages
