name: Repository Task Dogfood Cleanup

on:
  pull_request:
    paths:
      - '.github/workflows/repository-task-dogfood.yml'
      - '.github/scripts/runtime_finalize_repository_task.py'

permissions:
  contents: write

concurrency:
  group: repository-task-cleanup-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feat/repository-task-worker
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'

      - name: Apply deterministic ordinary-source corrections
        run: python .github/scripts/runtime_finalize_repository_task.py

      - name: Bootstrap workspace
        run: bash scripts/bootstrap-workspace.sh

      - name: Format and test focused worker
        run: |
          pnpm exec prettier --write workers/repository-task-ts/src/index.ts workers/repository-task-ts/test/index.test.ts examples/repository-task/run-dogfood.ts
          pnpm --filter @factory-floor/repository-task-worker test
          git diff --check

      - name: Commit ordinary candidate
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix(repository-task): retain schema-distinct failure artifacts'
          git push origin HEAD:feat/repository-task-worker
