name: Repository Task Dogfood

on:
  pull_request:
    paths:
      - '.github/workflows/repository-task-dogfood.yml'
      - 'examples/repository-task/**'
      - 'workers/repository-task-ts/**'

permissions:
  contents: write

concurrency:
  group: repository-task-finalizer-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dogfood:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feat/repository-task-worker
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'

      - name: Apply structural source corrections
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          source = Path('workers/repository-task-ts/src/index.ts')
          text = source.read_text()
          pattern = re.compile(
              r"(?P<i>\s*)normalizedPlan: compiled\.normalizedPlan,\n"
              r"(?P=i)generationGraph: compiled\.generationGraph,\n"
              r"(?P=i)patch: \{ patch: '', patchDigest: null \},\n"
              r"(?P=i)evidence:\n"
              r"(?P=i)  repositoryIdentity === undefined\n"
              r"(?P=i)    \? null\n"
              r"(?P=i)    : \{ repositoryIdentity, diagnostics \},"
          )
          replacement = """    normalizedPlan: compiled.normalizedPlan ?? {
              status: 'unavailable',
              phase,
              artifact: 'normalized-plan',
              diagnostics,
            },
            generationGraph: compiled.generationGraph ?? {
              status: 'unavailable',
              phase,
              artifact: 'generation-graph',
              diagnostics,
            },
            patch: { patch: '', patchDigest: null },
            evidence:
              repositoryIdentity === undefined
                ? {
                    status: 'unavailable',
                    phase,
                    artifact: 'evidence',
                    diagnostics,
                  }
                : { repositoryIdentity, diagnostics },"""
          text, count = pattern.subn(replacement, text, count=1)
          if count != 1:
              raise SystemExit(f'failure-artifact source replacement count={count}')
          source.write_text(text)

          tests = Path('workers/repository-task-ts/test/index.test.ts')
          text = tests.read_text()
          anchor = re.compile(
              r"(?P<i>\s*)expect\(workerContext\.staged\.at\(-1\)\?\.value\)\.toMatchObject\(\{\n"
              r"(?P=i)  status: 'failed',\n"
              r"(?P=i)  diagnostics: \[\{ code: 'markdown\.invalid' \}\],\n"
              r"(?P=i)\}\);"
          )
          match = anchor.search(text)
          if match is None:
              raise SystemExit('failure-artifact test anchor not found')
          indent = match.group('i')
          addition = match.group(0) + f"""
{indent}expect(
{indent}  workerContext.staged.find(
{indent}    ({{ portName }}) => portName === 'normalized-plan',
{indent}  )?.value,
{indent}).toMatchObject({{ status: 'unavailable', artifact: 'normalized-plan' }});
{indent}expect(
{indent}  workerContext.staged.find(
{indent}    ({{ portName }}) => portName === 'generation-graph',
{indent}  )?.value,
{indent}).toMatchObject({{ status: 'unavailable', artifact: 'generation-graph' }});
{indent}expect(
{indent}  workerContext.staged.find(({{ portName }}) => portName === 'evidence')
{indent}    ?.value,
{indent}).toMatchObject({{ status: 'unavailable', artifact: 'evidence' }});"""
          tests.write_text(text[:match.start()] + addition + text[match.end():])

          dogfood = Path('examples/repository-task/run-dogfood.ts')
          text = dogfood.read_text()
          authored = 'function authoredPlan(baseRevision: string): string {'
          if authored not in text:
              raise SystemExit('authored-plan anchor not found')
          helper = """function repositoryIdentity(
            baseRevision: string,
            snapshot: { files: Record<string, string> },
          ) {
            const canonicalFiles = Object.keys(snapshot.files)
              .sort()
              .map((path) => [path, snapshot.files[path]] as const);
            return {
              repository: { owner: 'laurajoyhutchins', name: 'factory-floor' },
              baseRevision,
              snapshotDigest: sha256(JSON.stringify(canonicalFiles)),
              dirtyStatePolicy: 'require-clean' as const,
            };
          }

          function authoredPlan(baseRevision: string): string {"""
          text = text.replace(authored, helper, 1)

          output_pattern = re.compile(
              r"async function outputArtifacts\([\s\S]*?\n}\n\nasync function writeJson\("
          )
          output_match = output_pattern.search(text)
          if output_match is None:
              raise SystemExit('output-artifact reader block not found')
          output_replacement = """async function readCommittedJson(
            blobStore: FilesystemArtifactBlobStore,
            digest: string,
          ): Promise<any> {
            const deadline = Date.now() + 30_000;
            for (;;) {
              try {
                return JSON.parse(
                  await streamText(await blobStore.readCommitted(digest)),
                );
              } catch (error) {
                const code = (error as { code?: unknown }).code;
                if (code !== 'not_found' || Date.now() >= deadline) throw error;
                await new Promise((resolve) => setTimeout(resolve, 50));
              }
            }
          }

          async function outputArtifacts(
            blobStore: FilesystemArtifactBlobStore,
            state: Awaited<ReturnType<typeof runState>>,
          ): Promise<Record<string, any>> {
            return Object.fromEntries(
              await Promise.all(
                state.outputs.map(async (output) => [
                  output.port_name,
                  await readCommittedJson(blobStore, output.digest),
                ]),
              ),
            );
          }

          async function writeJson("""
          text = text[:output_match.start()] + output_replacement + text[output_match.end():]

          replacements = [
              (
                  "    const snapshot = await repositorySnapshot();\n    const profile = repositoryProfile();",
                  "    const snapshot = await repositorySnapshot();\n    const identity = repositoryIdentity(baseRevision, snapshot);\n    const profile = repositoryProfile();",
                  'identity setup',
              ),
              (
                  "        repositorySnapshot: snapshot,\n      },\n      idempotencyKey: `repository-task-success-${baseRevision}`",
                  "        repositorySnapshot: snapshot,\n        repositoryIdentity: identity,\n      },\n      idempotencyKey: `repository-task-success-${baseRevision}`",
                  'success identity',
              ),
              (
                  "        repositorySnapshot: snapshot,\n      },\n      idempotencyKey: `repository-task-failure-${baseRevision}`",
                  "        repositorySnapshot: snapshot,\n        repositoryIdentity: repositoryIdentity(unavailableRevision, snapshot),\n      },\n      idempotencyKey: `repository-task-failure-${baseRevision}`",
                  'failure identity',
              ),
              (
                  "failureCode !== 'executor.base-unavailable'",
                  "failureCode !== 'worker.repository-identity-mismatch'",
                  'failure diagnostic',
              ),
          ]
          for old, new, label in replacements:
              if old not in text:
                  raise SystemExit(f'{label} anchor not found')
              text = text.replace(old, new, 1)
          dogfood.write_text(text)

          Path('.github/workflows/runtime-one-shot-dogfood-patch.yml').unlink(missing_ok=True)
          Path('.github/workflows/runtime-finalize-repository-task-dogfood.yml').unlink(missing_ok=True)
          PY

      - name: Bootstrap workspace
        run: bash scripts/bootstrap-workspace.sh

      - name: Format and test focused worker
        run: |
          pnpm exec prettier --write workers/repository-task-ts/src/index.ts workers/repository-task-ts/test/index.test.ts examples/repository-task/run-dogfood.ts
          pnpm --filter @factory-floor/repository-task-worker test
          git diff --check

      - name: Commit ordinary candidate
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix(repository-task): retain schema-distinct failure artifacts'
          git push origin HEAD:feat/repository-task-worker
