name: Patch external action recovery

on:
  push:
    branches:
      - agent/external-action-recovery

permissions:
  contents: write

concurrency:
  group: patch-external-action-recovery
  cancel-in-progress: true

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/external-action-recovery

      - name: Patch startup recovery
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('packages/runtime-core/src/observability/recovery-service.ts')
          text = path.read_text()

          replacements = [
              (
                  "import { EventService } from '../events/event-service.js';\n",
                  "import { EventService } from '../events/event-service.js';\nimport {\n  type ExternalActionReconciliationReport,\n  type ExternalActionService,\n} from '../external-actions/external-action-service.js';\n",
              ),
              (
                  "  artifactReconciliation: ArtifactReconciliationReport | null;\n  recoveryEventId: string | null;\n",
                  "  artifactReconciliation: ArtifactReconciliationReport | null;\n  externalActionReconciliation: ExternalActionReconciliationReport | null;\n  recoveryEventId: string | null;\n",
              ),
              (
                  "  blobStore?: ArtifactBlobStore;\n  clock?: () => Date;\n",
                  "  blobStore?: ArtifactBlobStore;\n  externalActions?: ExternalActionService;\n  clock?: () => Date;\n",
              ),
              (
                  "      reconciliationBatchSize?: number;\n      removeOrphanArtifacts?: boolean;\n",
                  "      reconciliationBatchSize?: number;\n      externalActionReconciliationBatchSize?: number;\n      removeOrphanArtifacts?: boolean;\n",
              ),
              (
                  "    const artifactReconciliation = await this.reconcileArtifacts({\n",
                  "    const externalActionReconciliation = this.deps.externalActions\n      ? await this.deps.externalActions.reconcilePending(\n          options.externalActionReconciliationBatchSize ?? 100,\n        )\n      : null;\n\n    const artifactReconciliation = await this.reconcileArtifacts({\n",
              ),
              (
                  "      artifactReconciliation:\n        artifactReconciliation === null\n          ? null\n          : (JSON.parse(JSON.stringify(artifactReconciliation)) as Json),\n      projectorVersion: 'task10.v2',\n",
                  "      artifactReconciliation:\n        artifactReconciliation === null\n          ? null\n          : (JSON.parse(JSON.stringify(artifactReconciliation)) as Json),\n      externalActionReconciliation:\n        externalActionReconciliation === null\n          ? null\n          : (JSON.parse(JSON.stringify(externalActionReconciliation)) as Json),\n      projectorVersion: 'task10.v2',\n",
              ),
              (
                  "      artifactReconciliation,\n      recoveryEventId: recoveryEvent?.id ?? null,\n",
                  "      artifactReconciliation,\n      externalActionReconciliation,\n      recoveryEventId: recoveryEvent?.id ?? null,\n",
              ),
          ]

          for old, new in replacements:
              if text.count(old) != 1:
                  raise SystemExit(f'expected one recovery patch match, found {text.count(old)}: {old!r}')
              text = text.replace(old, new)

          path.write_text(text)
          PY

      - name: Commit patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/runtime-core/src/observability/recovery-service.ts
          git commit -m 'feat: reconcile uncertain external actions on startup'
          git push origin HEAD:agent/external-action-recovery
