name: Agent PR handoff

on:
  pull_request_target:
    types:
      [
        opened,
        reopened,
        synchronize,
        edited,
        ready_for_review,
        converted_to_draft,
      ]
  workflow_run:
    workflows: [Repository Verification]
    types: [completed]

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  update:
    name: Update durable pull request state
    if: github.event_name != 'workflow_run' || github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out trusted handoff logic
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Update the sticky agent handoff
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const { pathToFileURL } = require('node:url');
            const logic = await import(
              pathToFileURL(`${process.env.GITHUB_WORKSPACE}/scripts/agent-pr-handoff-state.mjs`).href
            );
            const marker = '<!-- agent-handoff:v1 -->';
            const { owner, repo } = context.repo;
            const pullNumber = context.eventName === 'pull_request_target'
              ? context.payload.pull_request.number
              : context.payload.workflow_run.pull_requests?.[0]?.number;
            if (!pullNumber) {
              core.info('The workflow run is not associated with a pull request.');
              return;
            }

            const { data: pull } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: pullNumber,
            });
            const runs = await github.paginate(
              github.rest.actions.listWorkflowRunsForRepo,
              {
                owner,
                repo,
                head_sha: pull.head.sha,
                event: 'pull_request',
                per_page: 100,
              },
            );
            const latestRun = logic.selectRepositoryVerificationRun(
              runs,
              pull.head.sha,
              pullNumber,
            );

            let reviewThreads;
            try {
              reviewThreads = await logic.readReviewThreadState({
                graphql: github.graphql,
                owner,
                repo,
                pullNumber,
              });
            } catch (error) {
              core.warning(`Could not read complete review-thread state: ${error.message}`);
              reviewThreads = {
                status: 'unavailable',
                unresolvedCount: null,
              };
            }

            const decision = logic.determineHandoffState({
              draft: pull.draft,
              verificationRun: latestRun,
              reviewThreads,
              mergeableState: pull.mergeable_state,
            });
            const handoff = {
              schemaVersion: 1,
              repository: `${owner}/${repo}`,
              pullRequest: pullNumber,
              state: decision.state,
              draft: pull.draft,
              headRef: pull.head.ref,
              headSha: pull.head.sha,
              baseRef: pull.base.ref,
              baseSha: pull.base.sha,
              mergeableState: pull.mergeable_state,
              reviewThreadsStatus: reviewThreads.status,
              unresolvedReviewThreads: reviewThreads.unresolvedCount,
              latestWorkflow: latestRun
                ? {
                    name: latestRun.name,
                    runId: latestRun.id,
                    status: latestRun.status,
                    conclusion: latestRun.conclusion,
                    headSha: latestRun.head_sha,
                    url: latestRun.html_url,
                  }
                : null,
              externalBlocker: decision.externalBlocker,
              nextAction: decision.nextAction,
              updatedAt: new Date().toISOString(),
            };
            const workflowCell = latestRun
              ? `[${latestRun.name} #${latestRun.run_number}](${latestRun.html_url}) — ${latestRun.status}${latestRun.conclusion ? ` / ${latestRun.conclusion}` : ''}`
              : 'No exact-head Repository Verification run found';
            const reviewThreadCell = reviewThreads.status === 'available'
              ? String(reviewThreads.unresolvedCount)
              : 'unknown';
            const body = `${marker}
            ## Agent handoff

            | Field | Value |
            | --- | --- |
            | State | **${decision.state}** |
            | Head | \`${pull.head.ref}\` at \`${pull.head.sha}\` |
            | Base | \`${pull.base.ref}\` at \`${pull.base.sha}\` |
            | Mergeability | \`${pull.mergeable_state ?? 'unknown'}\` |
            | Latest workflow | ${workflowCell} |
            | Review-thread state | ${reviewThreads.status} |
            | Unresolved review threads | ${reviewThreadCell} |
            | External blocker | ${decision.externalBlocker ?? 'none'} |
            | Next action | ${decision.nextAction} |

            <details>
            <summary>Machine-readable state</summary>

            \`\`\`json
            ${JSON.stringify(handoff, null, 2)}
            \`\`\`
            </details>

            _This comment is updated in place; it is not an approval or merge decision._`.replace(/^ {12}/gm, '');
            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner,
                repo,
                issue_number: pullNumber,
                per_page: 100,
              },
            );
            const existing = comments.find((comment) =>
              comment.body?.includes(marker),
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pullNumber,
                body,
              });
            }
