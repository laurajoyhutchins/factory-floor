name: Repository Task Resilience Finalizer

on:
  push:
    branches:
      - feat/repository-task-worker
    paths:
      - '.github/workflows/repository-task-resilience-finalize.yml'
      - 'scripts/finalize-repository-task-resilience.py'

permissions:
  contents: write

env:
  DATABASE_URL: postgres://factory_floor:factory_floor_dev_password@127.0.0.1:5432/factory_floor
  TEST_DATABASE_URL: postgres://factory_floor:factory_floor_dev_password@127.0.0.1:5432/factory_floor
  FACTORY_FLOOR_WORKER_TOKEN: factory_floor_repository_task_worker_token
  WORKER_API_BEARER_TOKEN: factory_floor_repository_task_worker_token
  FACTORY_FLOOR_WORKER_ID: repository-task-dogfood-worker
  FACTORY_FLOOR_WORKER_COMPONENT_SELECTORS: repository-task@1
  WORKER_AUTHORIZATION_JSON: '{"repository-task-dogfood-worker":{"token":"factory_floor_repository_task_worker_token","capabilities":["repository-task@1"]}}'

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Check out branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feat/repository-task-worker
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'

      - name: Bootstrap workspace
        run: bash scripts/bootstrap-workspace.sh

      - name: Add retry and cancellation dogfood scenarios
        run: |
          python scripts/finalize-repository-task-resilience.py
          pnpm exec prettier --write examples/repository-task/run-dogfood.ts

      - name: Build workspace runtime
        run: pnpm build:production

      - name: Run repository-task resilience dogfood
        run: pnpm demo:repository-task

      - name: Commit ordinary-source resilience proof
        run: |
          rm .github/workflows/repository-task-resilience-finalize.yml
          rm scripts/finalize-repository-task-resilience.py
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add examples/repository-task/run-dogfood.ts .github/workflows/repository-task-resilience-finalize.yml scripts/finalize-repository-task-resilience.py
          git commit -m "test(repository-task): prove retry and cancellation resilience"
          git push origin HEAD:feat/repository-task-worker
