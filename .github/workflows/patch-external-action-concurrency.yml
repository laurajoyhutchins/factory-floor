name: Patch external action concurrency

on:
  push:
    branches:
      - agent/external-action-recovery

permissions:
  contents: write

concurrency:
  group: patch-external-action-concurrency
  cancel-in-progress: true

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/external-action-recovery

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'

      - name: Patch concurrency boundary and regression
        run: |
          python - <<'PY'
          from pathlib import Path

          service_path = Path('packages/runtime-core/src/external-actions/external-action-service.ts')
          service = service_path.read_text()
          replacements = [
              (
                  "  | { disposition: 'reconcile' }\n  | { disposition: 'cancelled' | 'terminal' };",
                  "  | {\n      disposition: 'uncertain';\n      status: 'dispatching' | 'indeterminate' | 'acknowledged';\n    }\n  | { disposition: 'cancelled' | 'terminal' };",
              ),
              (
                  "    if (prepared.disposition === 'reconcile') return this.reconcile(actionId);\n    if (prepared.disposition !== 'dispatch') return prepared;",
                  "    if (prepared.disposition !== 'dispatch') return prepared;",
              ),
              (
                  "      if (\n        ['dispatching', 'indeterminate', 'acknowledged'].includes(action.status)\n      )\n        return { disposition: 'reconcile' };",
                  "      if (\n        action.status === 'dispatching' ||\n        action.status === 'indeterminate' ||\n        action.status === 'acknowledged'\n      )\n        return { disposition: 'uncertain', status: action.status };",
              ),
          ]
          for old, new in replacements:
              if service.count(old) != 1:
                  raise SystemExit(f'expected one service patch match, found {service.count(old)}')
              service = service.replace(old, new)
          service_path.write_text(service)

          test_path = Path('tests/integration/runtime-core/external-action-recovery.test.ts')
          test = test_path.read_text()
          class_anchor = """class ProgrammingFailureProvider implements ExternalActionProvider {
  dispatchCalls = 0;
  reconcileCalls = 0;

  async dispatch(): Promise<ExternalActionProviderResult> {
    this.dispatchCalls++;
    throw new TypeError('provider adapter invariant failed');
  }

  async reconcile(): Promise<ExternalActionProviderResult> {
    this.reconcileCalls++;
    return {
      status: 'indeterminate',
      response: { code: 'unexpected_reconciliation' },
    };
  }
}
"""
          blocking_provider = class_anchor + """
class BlockingAcknowledgementProvider implements ExternalActionProvider {
  dispatchCalls = 0;
  reconcileCalls = 0;
  private markStarted!: () => void;
  private release!: () => void;
  readonly started = new Promise<void>((resolve) => {
    this.markStarted = resolve;
  });
  private readonly released = new Promise<void>((resolve) => {
    this.release = resolve;
  });

  completeDispatch() {
    this.release();
  }

  async dispatch(
    request: ExternalActionProviderRequest,
  ): Promise<ExternalActionProviderResult> {
    this.dispatchCalls++;
    this.markStarted();
    await this.released;
    return {
      status: 'acknowledged',
      response: { providerOperationId: `provider-${request.actionId}` },
    };
  }

  async reconcile(): Promise<ExternalActionProviderResult> {
    this.reconcileCalls++;
    throw new Error('dispatch callers must not reconcile an in-flight action');
  }
}
"""
          if test.count(class_anchor) != 1:
              raise SystemExit(f'expected one provider class anchor, found {test.count(class_anchor)}')
          test = test.replace(class_anchor, blocking_provider)

          test_anchor = """  it('cancels stale lifecycle authority before calling the provider', async () => {
"""
          concurrency_test = """  it('does not reconcile while the first provider dispatch is still in flight', async () => {
    const seeded = await seedAuthorizedAction(db);
    const provider = new BlockingAcknowledgementProvider();
    const service = new ExternalActionService(db, provider, () => now);

    const firstDispatch = service.dispatch(seeded.actionId);
    await provider.started;

    await expect(service.dispatch(seeded.actionId)).resolves.toEqual({
      disposition: 'uncertain',
      status: 'dispatching',
    });
    expect(provider.dispatchCalls).toBe(1);
    expect(provider.reconcileCalls).toBe(0);

    provider.completeDispatch();
    await expect(firstDispatch).resolves.toEqual({
      disposition: 'dispatched',
      status: 'acknowledged',
    });
    await expect(
      db
        .selectFrom('external_action_attempts')
        .select(['attempt_number', 'status'])
        .where('external_action_id', '=', seeded.actionId)
        .execute(),
    ).resolves.toEqual([{ attempt_number: 1, status: 'acknowledged' }]);
  });

""" + test_anchor
          if test.count(test_anchor) != 1:
              raise SystemExit(f'expected one test insertion anchor, found {test.count(test_anchor)}')
          test = test.replace(test_anchor, concurrency_test)
          test_path.write_text(test)
          PY

          corepack prepare pnpm@10.12.1 --activate
          corepack enable
          pnpm install --frozen-lockfile
          pnpm exec prettier --write \
            packages/runtime-core/src/external-actions/external-action-service.ts \
            tests/integration/runtime-core/external-action-recovery.test.ts

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            packages/runtime-core/src/external-actions/external-action-service.ts \
            tests/integration/runtime-core/external-action-recovery.test.ts
          git commit -m 'fix: keep duplicate dispatch callers out of reconciliation'
          git push origin HEAD:agent/external-action-recovery
