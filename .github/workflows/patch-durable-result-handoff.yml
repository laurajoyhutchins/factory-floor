name: Patch durable result handoff

on:
  push:
    branches:
      - agent/durable-result-handoff-recovery

permissions:
  contents: write

concurrency:
  group: patch-durable-result-handoff
  cancel-in-progress: true

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/durable-result-handoff-recovery

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'

      - name: Apply and format patch
        run: |
          python scripts/patch-durable-result-handoff.py
          corepack prepare pnpm@10.12.1 --activate
          corepack enable
          pnpm install --frozen-lockfile
          pnpm exec prettier --write \
            packages/db/src/database.ts \
            packages/db/src/migrations/zzzzzzzz_20260720_worker_result_submission_commit.ts \
            packages/runtime-core/src/worker/worker-protocol-service.ts \
            packages/runtime-core/src/commit/execution-commit-service.ts \
            packages/runtime-core/src/observability/recovery-service.ts \
            tests/integration/runtime-core/durable-result-handoff-recovery.test.ts

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            packages/db/src/database.ts \
            packages/db/src/migrations/zzzzzzzz_20260720_worker_result_submission_commit.ts \
            packages/runtime-core/src/worker/worker-protocol-service.ts \
            packages/runtime-core/src/commit/execution-commit-service.ts \
            packages/runtime-core/src/observability/recovery-service.ts \
            tests/integration/runtime-core/durable-result-handoff-recovery.test.ts
          git commit -m 'feat: recover durable worker result handoffs'
          git push origin HEAD:agent/durable-result-handoff-recovery
