name: Patch durable result handoff

on:
  push:
    branches:
      - agent/durable-result-handoff-recovery

permissions:
  contents: write

concurrency:
  group: patch-durable-result-handoff
  cancel-in-progress: true

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/durable-result-handoff-recovery

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'

      - name: Patch durable handoff recovery
        run: |
          python - <<'PY'
          from pathlib import Path

          database_path = Path('packages/db/src/database.ts')
          database = database_path.read_text()
          old = """  worker_result_submissions: Row & {
            execution_id: string;
            attempt_id: string;
            submission_digest: string;
            result: Jsonb;
          };
          """
          new = """  worker_result_submissions: Row & {
            execution_id: string;
            attempt_id: string;
            submission_digest: string;
            result: Jsonb;
            committed_at: Timestamp | null;
          };
          """
          if database.count(old) != 1:
              raise SystemExit(f'expected one database type match, found {database.count(old)}')
          database_path.write_text(database.replace(old, new))

          worker_path = Path('packages/runtime-core/src/worker/worker-protocol-service.ts')
          worker = worker_path.read_text()
          old_options = """export interface WorkerProtocolOptions {
            leaseDurationMs: number;
            baseUrl?: string;
          }
          """
          new_options = """export interface WorkerProtocolOptions {
            leaseDurationMs: number;
            baseUrl?: string;
            afterResultHandoffCommitted?: (input: {
              executionId: string;
              attemptId: string;
              submissionDigest: string;
            }) => void | Promise<void>;
          }
          """
          if worker.count(old_options) != 1:
              raise SystemExit(f'expected one worker options match, found {worker.count(old_options)}')
          worker = worker.replace(old_options, new_options)
          start = worker.index('  async submitResult(input: ProposedResultInput) {')
          end = worker.index('\n  async invokeCapability(', start)
          new_submit = """  async submitResult(input: ProposedResultInput) {
            const attempt = normalizeAttemptIdentity(input);
            const stagedArtifacts = input.stagedArtifacts.map(normalizeStagedArtifact);
            const proposedState = input.proposedState
              ? normalizeStagedArtifact(input.proposedState)
              : undefined;
            const digest = canonicalJsonDigest(input);
            const commitInput = {
              protocolVersion: input.protocolVersion,
              executionId: attempt.executionId,
              attemptId: attempt.attemptId,
              leaseToken: attempt.leaseToken,
              lifecycleEpoch: attempt.regionFencingEpoch,
              status: input.status,
              stagedArtifacts: stagedArtifacts.map(toWorkerV1StagedArtifact),
              proposedEvents: input.proposedEvents,
              externalActionProposals: input.externalActionProposals,
              resourceUsage: input.resourceUsage,
              ...(proposedState
                ? { proposedState: toWorkerV1StagedArtifact(proposedState) }
                : {}),
              ...(input.failure === undefined ? {} : { failure: input.failure }),
            };
            const handoff = await this.db.transaction().execute(async (transaction) => {
              const existing = await transaction
                .selectFrom('worker_result_submissions')
                .select('submission_digest')
                .where('attempt_id', '=', attempt.attemptId)
                .executeTakeFirst();
              if (existing) {
                if (existing.submission_digest === digest)
                  return { duplicate: true as const };
                throw new WorkerProtocolError(
                  'duplicate_conflicting_result',
                  'attempt already has a different proposed result',
                  false,
                  409,
                );
              }
              const inserted = await transaction
                .insertInto('worker_result_submissions')
                .values({
                  id: createUuidV7(),
                  execution_id: attempt.executionId,
                  attempt_id: attempt.attemptId,
                  submission_digest: digest,
                  result: commitInput as unknown as Json,
                  committed_at: null,
                })
                .onConflict((conflict) =>
                  conflict.column('attempt_id').doNothing(),
                )
                .returning('submission_digest')
                .executeTakeFirst();
              if (!inserted) {
                const concurrent = await transaction
                  .selectFrom('worker_result_submissions')
                  .select('submission_digest')
                  .where('attempt_id', '=', attempt.attemptId)
                  .executeTakeFirstOrThrow();
                if (concurrent.submission_digest === digest)
                  return { duplicate: true as const };
                throw new WorkerProtocolError(
                  'duplicate_conflicting_result',
                  'attempt already has a different proposed result',
                  false,
                  409,
                );
              }
              await this.activeAttempt(attempt, transaction, true);
              await this.validateStagedArtifacts(transaction, attempt.attemptId, [
                ...stagedArtifacts,
                ...(proposedState ? [proposedState] : []),
              ]);
              return { duplicate: false as const };
            });
            await this.options.afterResultHandoffCommitted?.({
              executionId: attempt.executionId,
              attemptId: attempt.attemptId,
              submissionDigest: digest,
            });
            try {
              await new ExecutionCommitService(
                this.db,
                this.blobStore,
                this.clock,
              ).commitSubmittedResult(attempt.attemptId);
            } catch (error) {
              if (error instanceof ExecutionCommitError)
                throw new WorkerProtocolError(
                  error.code === 'external_action_unauthorized'
                    ? 'capability_denied'
                    : error.code === 'invalid_staged_artifact'
                      ? 'unauthorized_staging_reference'
                      : (error.code as WorkerErrorCode),
                  error.message,
                  error.statusCode >= 500,
                  error.statusCode,
                );
              throw error;
            }
            return {
              protocolVersion: '1.0' as const,
              accepted: true,
              duplicate: handoff.duplicate,
              handoff: 'committed_by_control_plane' as const,
            };
          }
          """
          worker_path.write_text(worker[:start] + new_submit + worker[end:])

          commit_path = Path('packages/runtime-core/src/commit/execution-commit-service.ts')
          commit = commit_path.read_text()
          old_types = """};
          type Promotion = {
          """
          new_types = """};
          interface CommitOptions {
            allowExpiredLease?: boolean;
          }
          type Promotion = {
          """
          if commit.count(old_types) != 1:
              raise SystemExit(f'expected one commit type match, found {commit.count(old_types)}')
          commit = commit.replace(old_types, new_types)
          class_anchor = 'export class ExecutionCommitService {'
          normalize = """function normalizeSubmittedResult(value: Json): ProposedExecutionResult {
            const raw = value as any;
            const normalizeStaged = (staged: any): Staged => ({
              ...staged,
              stagingId: staged.stagingId ?? staged.stagingRef,
            });
            return {
              ...raw,
              lifecycleEpoch: raw.lifecycleEpoch ?? raw.regionFencingEpoch,
              stagedArtifacts: Array.isArray(raw.stagedArtifacts)
                ? raw.stagedArtifacts.map(normalizeStaged)
                : [],
              ...(raw.proposedState
                ? { proposedState: normalizeStaged(raw.proposedState) }
                : {}),
            } as ProposedExecutionResult;
          }

          """
          if commit.count(class_anchor) != 1:
              raise SystemExit('expected one execution commit class anchor')
          commit = commit.replace(class_anchor, normalize + class_anchor)
          method_start = commit.index('  async commitSubmittedResult(attemptId: string) {')
          method_end = commit.index('\n  async commit(', method_start)
          new_method = """  async commitSubmittedResult(
            attemptId: string,
            options: CommitOptions = {},
          ) {
            const submission = await this.db
              .selectFrom('worker_result_submissions')
              .selectAll()
              .where('attempt_id', '=', attemptId)
              .executeTakeFirstOrThrow();
            return this.commit(
              normalizeSubmittedResult(submission.result),
              submission.submission_digest,
              options,
            );
          }
          """
          commit = commit[:method_start] + new_method + commit[method_end:]
          old_signature = """  async commit(
            input: ProposedExecutionResult,
            submissionDigest = canonicalJsonDigest(input),
          ) {
          """
          new_signature = """  async commit(
            input: ProposedExecutionResult,
            submissionDigest = canonicalJsonDigest(input),
            options: CommitOptions = {},
          ) {
          """
          if commit.count(old_signature) != 1:
              raise SystemExit(f'expected one commit signature match, found {commit.count(old_signature)}')
          commit = commit.replace(old_signature, new_signature)
          digest_anchor = """        if (submission && submission.submission_digest !== submissionDigest)
                  throw new ExecutionCommitError(
                    'duplicate_conflicting_result',
                    'attempt already has a different proposed result',
                  );
                if (!['leased', 'running'].includes(attempt.status)) {
                  if (submission) return { disposition: 'duplicate' as const };
          """
          digest_replacement = """        if (submission && submission.submission_digest !== submissionDigest)
                  throw new ExecutionCommitError(
                    'duplicate_conflicting_result',
                    'attempt already has a different proposed result',
                  );
                if (submission?.committed_at)
                  return { disposition: 'duplicate' as const };
                if (!['leased', 'running'].includes(attempt.status)) {
          """
          if commit.count(digest_anchor) != 1:
              raise SystemExit(f'expected one terminal attempt match, found {commit.count(digest_anchor)}')
          commit = commit.replace(digest_anchor, digest_replacement)
          execution_terminal = """        if (execution.status !== 'running') {
                  if (submission) return { disposition: 'duplicate' as const };
                  throw new ExecutionCommitError(
          """
          execution_replacement = """        if (execution.status !== 'running') {
                  throw new ExecutionCommitError(
          """
          if commit.count(execution_terminal) != 1:
              raise SystemExit(f'expected one terminal execution match, found {commit.count(execution_terminal)}')
          commit = commit.replace(execution_terminal, execution_replacement)
          authority = '        this.assertAuthority(input, attempt, execution, region, deliveries);'
          authority_replacement = """        this.assertAuthority(
                  input,
                  attempt,
                  execution,
                  region,
                  deliveries,
                  options.allowExpiredLease === true,
                );"""
          if commit.count(authority) != 1:
              raise SystemExit('expected one authority invocation')
          commit = commit.replace(authority, authority_replacement)
          outcome = """        if (input.status === 'completed')
                  return this.complete(
                    trx,
                    input,
                    execution,
                    component,
                    deliveries,
                    artifactIds,
                  );
                return this.failOrRetry(trx, input, execution, attempt, deliveries);
          """
          outcome_replacement = """        const disposition =
                  input.status === 'completed'
                    ? await this.complete(
                        trx,
                        input,
                        execution,
                        component,
                        deliveries,
                        artifactIds,
                      )
                    : await this.failOrRetry(
                        trx,
                        input,
                        execution,
                        attempt,
                        deliveries,
                      );
                await trx
                  .updateTable('worker_result_submissions')
                  .set({ committed_at: this.clock() })
                  .where('attempt_id', '=', input.attemptId)
                  .where('submission_digest', '=', submissionDigest)
                  .where('committed_at', 'is', null)
                  .executeTakeFirstOrThrow();
                return disposition;
          """
          if commit.count(outcome) != 1:
              raise SystemExit(f'expected one commit outcome match, found {commit.count(outcome)}')
          commit = commit.replace(outcome, outcome_replacement)
          delete_anchor = """          .where('attempt_id', '=', input.attemptId)
                    .where('submission_digest', '=', submissionDigest)
                    .execute();
          """
          delete_replacement = """          .where('attempt_id', '=', input.attemptId)
                    .where('submission_digest', '=', submissionDigest)
                    .where('committed_at', 'is', null)
                    .execute();
          """
          if commit.count(delete_anchor) != 1:
              raise SystemExit(f'expected one submission cleanup match, found {commit.count(delete_anchor)}')
          commit = commit.replace(delete_anchor, delete_replacement)
          assert_signature = """  private assertAuthority(
            input: ProposedExecutionResult,
            attempt: any,
            execution: any,
            region: any,
            deliveries: any[],
          ) {
          """
          assert_replacement = """  private assertAuthority(
            input: ProposedExecutionResult,
            attempt: any,
            execution: any,
            region: any,
            deliveries: any[],
            allowExpiredLease: boolean,
          ) {
          """
          if commit.count(assert_signature) != 1:
              raise SystemExit(f'expected one assert signature match, found {commit.count(assert_signature)}')
          commit = commit.replace(assert_signature, assert_replacement)
          expiry = """    if (!attempt.lease_expires_at || attempt.lease_expires_at <= this.clock())
                throw new ExecutionCommitError('lease_expired', 'lease has expired');
          """
          expiry_replacement = """    if (
              !allowExpiredLease &&
              (!attempt.lease_expires_at || attempt.lease_expires_at <= this.clock())
            )
              throw new ExecutionCommitError('lease_expired', 'lease has expired');
          """
          if commit.count(expiry) != 1:
              raise SystemExit(f'expected one lease expiry match, found {commit.count(expiry)}')
          commit_path.write_text(commit.replace(expiry, expiry_replacement))

          recovery_path = Path('packages/runtime-core/src/observability/recovery-service.ts')
          recovery = recovery_path.read_text()
          import_anchor = """import {
            type ExternalActionReconciliationReport,
            type ExternalActionService,
          } from '../external-actions/external-action-service.js';
          """
          import_replacement = import_anchor + """import {
            ExecutionCommitError,
            ExecutionCommitService,
          } from '../commit/execution-commit-service.js';
          """
          if recovery.count(import_anchor) != 1:
              raise SystemExit('expected one recovery import anchor')
          recovery = recovery.replace(import_anchor, import_replacement)
          summary_anchor = """export interface StartupRecoverySummary {
            expiredAttemptsAbandoned: number;
          """
          summary_replacement = """export interface StartupRecoverySummary {
            submittedResultsScanned: number;
            submittedResultsCommitted: number;
            submittedResultsRejected: number;
            expiredAttemptsAbandoned: number;
          """
          if recovery.count(summary_anchor) != 1:
              raise SystemExit('expected one recovery summary anchor')
          recovery = recovery.replace(summary_anchor, summary_replacement)
          option_anchor = """      externalActionReconciliationBatchSize?: number;
                removeOrphanArtifacts?: boolean;
          """
          option_replacement = """      externalActionReconciliationBatchSize?: number;
                resultCommitBatchSize?: number;
                removeOrphanArtifacts?: boolean;
          """
          if recovery.count(option_anchor) != 1:
              raise SystemExit('expected one recovery option anchor')
          recovery = recovery.replace(option_anchor, option_replacement)
          now_anchor = """    const now = options.now ?? this.clock();
            const expiredAttemptIds = await this.db
          """
          now_replacement = """    const now = options.now ?? this.clock();
            const pendingSubmissions = await this.db
              .selectFrom('worker_result_submissions')
              .select('attempt_id')
              .where('committed_at', 'is', null)
              .orderBy('created_at')
              .orderBy('id')
              .limit(options.resultCommitBatchSize ?? 100)
              .execute();
            const resultCommit = new ExecutionCommitService(
              this.db,
              this.deps.blobStore,
              this.clock,
            );
            let submittedResultsScanned = 0;
            let submittedResultsCommitted = 0;
            let submittedResultsRejected = 0;
            for (const submission of pendingSubmissions) {
              submittedResultsScanned++;
              try {
                await resultCommit.commitSubmittedResult(submission.attempt_id, {
                  allowExpiredLease: true,
                });
                submittedResultsCommitted++;
              } catch (error) {
                if (error instanceof ExecutionCommitError && error.statusCode < 500) {
                  submittedResultsRejected++;
                  continue;
                }
                throw error;
              }
            }

            const expiredAttemptIds = await this.db
          """
          if recovery.count(now_anchor) != 1:
              raise SystemExit('expected one recovery start anchor')
          recovery = recovery.replace(now_anchor, now_replacement)
          payload_anchor = """    const recoveryPayload: Json = {
              expiredAttemptsAbandoned,
          """
          payload_replacement = """    const recoveryPayload: Json = {
              submittedResultsScanned,
              submittedResultsCommitted,
              submittedResultsRejected,
              expiredAttemptsAbandoned,
          """
          if recovery.count(payload_anchor) != 1:
              raise SystemExit('expected one recovery payload anchor')
          recovery = recovery.replace(payload_anchor, payload_replacement)
          return_anchor = """    return {
              expiredAttemptsAbandoned,
          """
          return_replacement = """    return {
              submittedResultsScanned,
              submittedResultsCommitted,
              submittedResultsRejected,
              expiredAttemptsAbandoned,
          """
          if recovery.count(return_anchor) != 1:
              raise SystemExit('expected one recovery return anchor')
          recovery_path.write_text(recovery.replace(return_anchor, return_replacement))
          PY

          corepack prepare pnpm@10.12.1 --activate
          corepack enable
          pnpm install --frozen-lockfile
          pnpm exec prettier --write \
            packages/db/src/database.ts \
            packages/db/src/migrations/zzzzzzzz_20260720_worker_result_submission_commit.ts \
            packages/runtime-core/src/worker/worker-protocol-service.ts \
            packages/runtime-core/src/commit/execution-commit-service.ts \
            packages/runtime-core/src/observability/recovery-service.ts

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            packages/db/src/database.ts \
            packages/db/src/migrations/zzzzzzzz_20260720_worker_result_submission_commit.ts \
            packages/runtime-core/src/worker/worker-protocol-service.ts \
            packages/runtime-core/src/commit/execution-commit-service.ts \
            packages/runtime-core/src/observability/recovery-service.ts
          git commit -m 'feat: recover durable worker result handoffs'
          git push origin HEAD:agent/durable-result-handoff-recovery
