name: Temporary browser service ownership fix

on:
  pull_request:

permissions:
  contents: write

jobs:
  fix-fixture:
    if: github.head_ref == 'test/operator-browser-smoke'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: test/operator-browser-smoke
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'

      - name: Bootstrap workspace
        run: bash scripts/bootstrap-workspace.sh

      - name: Give fixture explicit service ownership
        run: |
          python - <<'PY'
          from pathlib import Path

          runner = Path('scripts/run-operator-browser-smoke.mjs')
          text = runner.read_text()
          marker = "try {\n  run('pnpm', ['db:reset'], 'pnpm db:reset');\n"
          replacement = """try {
            run('pnpm', ['services:up'], 'start browser-smoke services');
            run('pnpm', ['services:wait'], 'wait for browser-smoke services');
            run('pnpm', ['db:migrate'], 'migrate browser-smoke database');
            run('pnpm', ['db:reset'], 'pnpm db:reset');
          """
          if marker not in text:
              raise SystemExit('runner startup marker not found')
          runner.write_text(text.replace(marker, replacement, 1))

          contract = Path('scripts/operator-browser-smoke-contract.test.mjs')
          text = contract.read_text()
          marker = "    expect(runner).toContain('pnpm db:reset');\n"
          replacement = (
              "    expect(runner).toContain(\"['services:up']\");\n"
              "    expect(runner).toContain(\"['services:wait']\");\n"
              "    expect(runner).toContain(\"['db:migrate']\");\n"
              + marker
          )
          if marker not in text:
              raise SystemExit('contract startup marker not found')
          contract.write_text(text.replace(marker, replacement, 1))
          PY

      - name: Format fixture changes
        run: |
          pnpm exec prettier --write \
            scripts/run-operator-browser-smoke.mjs \
            scripts/operator-browser-smoke-contract.test.mjs

      - name: Commit fixture service ownership
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/run-operator-browser-smoke.mjs scripts/operator-browser-smoke-contract.test.mjs
          git commit -m 'fix: make browser smoke own service startup'
          git push origin HEAD:test/operator-browser-smoke
