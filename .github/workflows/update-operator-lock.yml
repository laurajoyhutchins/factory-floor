name: Update operator package lockfile

on:
  push:
    branches:
      - feat/extract-operator-client-ui

permissions:
  contents: write

jobs:
  lockfile:
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, 'chore(lockfile)')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: pnpm install --lockfile-only --no-frozen-lockfile
      - name: Commit generated lockfile
        run: |
          if git diff --quiet -- pnpm-lock.yaml; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add pnpm-lock.yaml
          git commit -m "chore(lockfile): register operator packages"
          git push
