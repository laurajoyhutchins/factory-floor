name: Review clearance

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review, converted_to_draft]
  issue_comment:
    types: [created, edited, deleted]
  pull_request_review:
    types: [submitted, edited, dismissed]
  pull_request_review_comment:
    types: [created, edited, deleted]
  workflow_run:
    workflows: [Repository Verification]
    types: [completed]

permissions:
  actions: read
  contents: read
  issues: read
  pull-requests: read
  statuses: write

jobs:
  evaluate:
    name: Publish exact-head verification and review clearance
    if: github.event_name != 'workflow_run' || github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out trusted pull request state logic
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Evaluate trusted pull request statuses
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const { pathToFileURL } = require('node:url');
            const shared = await import(
              pathToFileURL(`${process.env.GITHUB_WORKSPACE}/scripts/github-pr-state.mjs`).href
            );
            const review = await import(
              pathToFileURL(`${process.env.GITHUB_WORKSPACE}/scripts/review-clearance-state.mjs`).href
            );
            const { owner, repo } = context.repo;
            const pullNumbers = shared.selectPullNumbersForEvent({
              eventName: context.eventName,
              payload: context.payload,
            });

            for (const pullNumber of pullNumbers) {
              const state = await shared.resolvePullRequestState({
                github,
                owner,
                repo,
                pullNumber,
              });
              const { pull, workflowRun, reviewThreads } = state;
              if (state.reviewThreadsError) {
                core.warning(
                  `Could not read complete review-thread state for PR #${pullNumber}: ${state.reviewThreadsError}`,
                );
              }

              const verification = shared.determineVerificationStatus(workflowRun);
              await github.rest.repos.createCommitStatus({
                owner,
                repo,
                sha: pull.head.sha,
                state: verification.state,
                context: 'verify',
                description: verification.description.slice(0, 140),
                target_url: workflowRun?.html_url ?? pull.html_url,
              });

              const comments = await github.paginate(
                github.rest.issues.listComments,
                {
                  owner,
                  repo,
                  issue_number: pullNumber,
                  per_page: 100,
                },
              );
              const clearance = review.parseReviewClearance({
                comments,
                ownerLogin: context.payload.repository.owner.login,
                headSha: pull.head.sha,
              });
              const decision = review.determineReviewClearanceStatus({
                draft: pull.draft,
                workflowRun,
                reviewThreads,
                clearance,
              });
              await github.rest.repos.createCommitStatus({
                owner,
                repo,
                sha: pull.head.sha,
                state: decision.state,
                context: 'review / cleared',
                description: decision.description.slice(0, 140),
                target_url: pull.html_url,
              });

              core.info(
                `PR #${pullNumber} at ${pull.head.sha}: verify=${verification.state}; review=${decision.state}`,
              );
            }
