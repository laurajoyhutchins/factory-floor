name: Format Task 12C Teardown Fix

on:
  push:
    branches:
      - codex/close-milestone-1-acceptance-and-retain-evidence

permissions:
  contents: write

jobs:
  format:
    if: ${{ !contains(github.event.head_commit.message, '[task12c-teardown-formatted]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: codex/close-milestone-1-acceptance-and-retain-evidence

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.12.1 --activate

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Format teardown fix
        run: pnpm exec prettier --write tests/integration/runtime-core/registration-and-system.test.ts

      - name: Commit formatted file
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add tests/integration/runtime-core/registration-and-system.test.ts
          git commit -m 'style: format teardown fix [task12c-teardown-formatted]'
          git push origin HEAD:codex/close-milestone-1-acceptance-and-retain-evidence
