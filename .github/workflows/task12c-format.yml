name: Format Final Milestone Evidence Records

on:
  push:
    branches:
      - codex/close-milestone-1-acceptance-and-retain-evidence

permissions:
  contents: write

jobs:
  format:
    if: ${{ !contains(github.event.head_commit.message, '[task12c-records-formatted]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: codex/close-milestone-1-acceptance-and-retain-evidence

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.12.1 --activate

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Format final records
        run: |
          pnpm exec prettier --write \
            docs/conformance/durable-reactive-graph-ledger.yaml \
            docs/evidence/m1-durable-reactive-graph.md

      - name: Commit formatted records
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            docs/conformance/durable-reactive-graph-ledger.yaml \
            docs/evidence/m1-durable-reactive-graph.md
          git commit -m 'style: format final milestone records [task12c-records-formatted]'
          git push origin HEAD:codex/close-milestone-1-acceptance-and-retain-evidence
