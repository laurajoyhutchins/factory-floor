name: Format Task 12C Files

on:
  push:
    branches:
      - codex/close-milestone-1-acceptance-and-retain-evidence

permissions:
  contents: write

jobs:
  format:
    if: ${{ !contains(github.event.head_commit.message, '[task12c-formatted]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: codex/close-milestone-1-acceptance-and-retain-evidence

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.12.1 --activate

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Format reviewed files
        run: |
          pnpm exec prettier --write \
            apps/cli/src/index.ts \
            scripts/collect-m1-evidence.mjs \
            scripts/run-m1-cancellation-evidence.ts

      - name: Commit formatted files
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            apps/cli/src/index.ts \
            scripts/collect-m1-evidence.mjs \
            scripts/run-m1-cancellation-evidence.ts
          git commit -m 'style: format milestone acceptance files [task12c-formatted]'
          git push origin HEAD:codex/close-milestone-1-acceptance-and-retain-evidence
