name: Apply durable template instantiation history

on:
  push:
    branches:
      - feat/durable-template-instantiations
    paths:
      - .github/workflows/apply-durable-template-instantiations.yml

permissions:
  contents: write

concurrency:
  group: durable-template-instantiation-patch
  cancel-in-progress: false

jobs:
  apply:
    if: contains(github.event.head_commit.message, 'run durable history implementation')
    runs-on: ubuntu-24.04
    steps:
      - name: Check out feature branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          ref: feat/durable-template-instantiations

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: pnpm

      - name: Activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.12.1 --activate

      - name: Apply implementation patch
        run: |
          base64 --decode .github/automation/apply_durable_history.py.gz.b64 | gzip --decompress > /tmp/apply_durable_history.py
          python /tmp/apply_durable_history.py

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate contracts
        run: pnpm contracts:generate

      - name: Format implementation
        run: pnpm format

      - name: Verify static checks
        run: pnpm verify:static

      - name: Verify focused unit tests
        run: pnpm exec vitest run --config vitest.config.ts packages/runtime-core/test/template-instantiation-history.test.ts packages/runtime-core/test/template-instantiation-contract.test.ts

      - name: Commit implementation
        run: |
          rm .github/workflows/apply-durable-template-instantiations.yml
          rm .github/automation/apply_durable_history.py.gz.b64
          rmdir .github/automation 2>/dev/null || true
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add --all
          git diff --cached --check
          git commit -m "feat(runtime): persist atomic template instantiation history"
          git push origin HEAD:feat/durable-template-instantiations
