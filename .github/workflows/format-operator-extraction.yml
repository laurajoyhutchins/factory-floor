name: Format operator extraction

on:
  push:
    branches:
      - feat/extract-operator-client-ui

permissions:
  contents: write

jobs:
  format:
    if: >-
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.head_commit.message, 'format extracted operator packages')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feat/extract-operator-client-ui
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: pnpm
      - run: |
          corepack enable
          pnpm install --frozen-lockfile
          pnpm exec prettier --write \
            packages/operator-client-ts/src/index.ts \
            packages/operator-ui-react/src/pages/run-operator.tsx
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/operator-client-ts/src/index.ts packages/operator-ui-react/src/pages/run-operator.tsx
          git diff --cached --quiet || git commit -m 'style(operator): format extracted operator packages'
          git push origin HEAD:feat/extract-operator-client-ui
