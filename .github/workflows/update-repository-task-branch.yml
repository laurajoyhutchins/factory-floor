name: Update repository-task branch

on:
  push:
    branches:
      - feat/repository-task-contracts
    paths:
      - .github/workflows/update-repository-task-branch.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feat/repository-task-contracts

      - name: Merge current main
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin main
          if git merge-base --is-ancestor origin/main HEAD; then
            echo "Branch already contains main."
            exit 0
          fi
          git merge --no-ff --no-edit origin/main
          git push origin HEAD:feat/repository-task-contracts
