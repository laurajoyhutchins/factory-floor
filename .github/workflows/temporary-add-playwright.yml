name: Temporary Playwright dependency update

on:
  pull_request:

permissions:
  contents: write

jobs:
  update-dependency:
    if: github.head_ref == 'test/operator-browser-smoke'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: test/operator-browser-smoke
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'

      - name: Activate pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.12.1 --activate

      - name: Add Playwright and browser command
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          packageJson.scripts['test:browser:smoke'] = 'node scripts/run-operator-browser-smoke.mjs';
          packageJson.devDependencies['@playwright/test'] = '^1.55.0';
          fs.writeFileSync('package.json', `${JSON.stringify(packageJson, null, 2)}\n`);
          NODE
          pnpm install --lockfile-only --no-frozen-lockfile

      - name: Commit dependency metadata
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package.json pnpm-lock.yaml
          git commit -m 'test: add pinned Playwright browser runner'
          git push origin HEAD:test/operator-browser-smoke
