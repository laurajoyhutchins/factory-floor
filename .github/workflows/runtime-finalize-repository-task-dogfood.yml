name: Runtime finalize repository-task dogfood

on:
  push:
    branches:
      - feat/repository-task-worker
    paths:
      - '.github/workflows/runtime-finalize-repository-task-dogfood.yml'

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feat/repository-task-worker
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'

      - name: Apply bounded source corrections
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected one match, found {count}')
              return text.replace(old, new, 1)

          source = Path('workers/repository-task-ts/src/index.ts')
          text = source.read_text()
          text = replace_once(
              text,
              """    normalizedPlan: compiled.normalizedPlan,
              generationGraph: compiled.generationGraph,
              patch: { patch: '', patchDigest: null },
              evidence:
                repositoryIdentity === undefined
                  ? null
                  : { repositoryIdentity, diagnostics },""",
              """    normalizedPlan: compiled.normalizedPlan ?? {
              status: 'unavailable',
              phase,
              artifact: 'normalized-plan',
              diagnostics,
            },
            generationGraph: compiled.generationGraph ?? {
              status: 'unavailable',
              phase,
              artifact: 'generation-graph',
              diagnostics,
            },
            patch: { patch: '', patchDigest: null },
            evidence:
              repositoryIdentity === undefined
                ? {
                    status: 'unavailable',
                    phase,
                    artifact: 'evidence',
                    diagnostics,
                  }
                : { repositoryIdentity, diagnostics },""",
              'failure artifacts',
          )
          source.write_text(text)

          tests = Path('workers/repository-task-ts/test/index.test.ts')
          text = tests.read_text()
          marker = """    expect(workerContext.staged.at(-1)?.value).toMatchObject({
              status: 'failed',
              diagnostics: [{ code: 'markdown.invalid' }],
            });"""
          addition = marker + """
            expect(
              workerContext.staged.find(
                ({ portName }) => portName === 'normalized-plan',
              )?.value,
            ).toMatchObject({ status: 'unavailable', artifact: 'normalized-plan' });
            expect(
              workerContext.staged.find(
                ({ portName }) => portName === 'generation-graph',
              )?.value,
            ).toMatchObject({ status: 'unavailable', artifact: 'generation-graph' });
            expect(
              workerContext.staged.find(({ portName }) => portName === 'evidence')
                ?.value,
            ).toMatchObject({ status: 'unavailable', artifact: 'evidence' });"""
          text = replace_once(text, marker, addition, 'failure artifact tests')
          tests.write_text(text)

          dogfood = Path('examples/repository-task/run-dogfood.ts')
          text = dogfood.read_text()
          text = replace_once(
              text,
              """function authoredPlan(baseRevision: string): string {""",
              """function repositoryIdentity(
            baseRevision: string,
            snapshot: { files: Record<string, string> },
          ) {
            const canonicalFiles = Object.keys(snapshot.files)
              .sort()
              .map((path) => [path, snapshot.files[path]] as const);
            return {
              repository: { owner: 'laurajoyhutchins', name: 'factory-floor' },
              baseRevision,
              snapshotDigest: sha256(JSON.stringify(canonicalFiles)),
              dirtyStatePolicy: 'require-clean' as const,
            };
          }

          function authoredPlan(baseRevision: string): string {""",
              'identity helper',
          )
          text = replace_once(
              text,
              """async function outputArtifacts(
            blobStore: FilesystemArtifactBlobStore,
            state: Awaited<ReturnType<typeof runState>>,
          ): Promise<Record<string, any>> {
            return Object.fromEntries(
              await Promise.all(
                state.outputs.map(async (output) => [
                  output.port_name,
                  JSON.parse(
                    await streamText(await blobStore.readCommitted(output.digest)),
                  ),
                ]),
              ),
            );
          }""",
              """async function readCommittedJson(
            blobStore: FilesystemArtifactBlobStore,
            digest: string,
          ): Promise<any> {
            const deadline = Date.now() + 30_000;
            for (;;) {
              try {
                return JSON.parse(
                  await streamText(await blobStore.readCommitted(digest)),
                );
              } catch (error) {
                const code = (error as { code?: unknown }).code;
                if (code !== 'not_found' || Date.now() >= deadline) throw error;
                await new Promise((resolve) => setTimeout(resolve, 50));
              }
            }
          }

          async function outputArtifacts(
            blobStore: FilesystemArtifactBlobStore,
            state: Awaited<ReturnType<typeof runState>>,
          ): Promise<Record<string, any>> {
            return Object.fromEntries(
              await Promise.all(
                state.outputs.map(async (output) => [
                  output.port_name,
                  await readCommittedJson(blobStore, output.digest),
                ]),
              ),
            );
          }""",
              'committed artifact wait',
          )
          text = replace_once(
              text,
              """    const snapshot = await repositorySnapshot();
              const profile = repositoryProfile();""",
              """    const snapshot = await repositorySnapshot();
              const identity = repositoryIdentity(baseRevision, snapshot);
              const profile = repositoryProfile();""",
              'identity setup',
          )
          text = replace_once(
              text,
              """        repositoryProfile: profile,
                repositorySnapshot: snapshot,
              },
              idempotencyKey: `repository-task-success-${baseRevision}`,""",
              """        repositoryProfile: profile,
                repositorySnapshot: snapshot,
                repositoryIdentity: identity,
              },
              idempotencyKey: `repository-task-success-${baseRevision}`,""",
              'success identity',
          )
          text = replace_once(
              text,
              """        repositoryProfile: profile,
                repositorySnapshot: snapshot,
              },
              idempotencyKey: `repository-task-failure-${baseRevision}`,""",
              """        repositoryProfile: profile,
                repositorySnapshot: snapshot,
                repositoryIdentity: repositoryIdentity(unavailableRevision, snapshot),
              },
              idempotencyKey: `repository-task-failure-${baseRevision}`,""",
              'failure identity',
          )
          text = replace_once(
              text,
              "failureCode !== 'executor.base-unavailable'",
              "failureCode !== 'worker.repository-identity-mismatch'",
              'failure diagnostic',
          )
          dogfood.write_text(text)

          workflow = Path('.github/workflows/repository-task-dogfood.yml')
          text = workflow.read_text()
          start_marker = '      - name: Prepare bounded committed-artifact wait candidate\n'
          if start_marker in text:
              start = text.index(start_marker)
              end = text.index('      - name: Set up Node.js\n', start)
              text = text[:start] + text[end:]
          format_marker = """      - name: Format bounded wait candidate
                run: pnpm exec prettier --write examples/repository-task/run-dogfood.ts

          """
          text = text.replace(format_marker, '', 1)
          workflow.write_text(text)

          Path('.github/workflows/runtime-one-shot-dogfood-patch.yml').unlink(missing_ok=True)
          Path('.github/workflows/runtime-finalize-repository-task-dogfood.yml').unlink(missing_ok=True)
          PY

      - name: Bootstrap workspace
        run: bash scripts/bootstrap-workspace.sh

      - name: Format and verify focused worker
        run: |
          pnpm exec prettier --write \
            workers/repository-task-ts/src/index.ts \
            workers/repository-task-ts/test/index.test.ts \
            examples/repository-task/run-dogfood.ts \
            .github/workflows/repository-task-dogfood.yml
          pnpm --filter @factory-floor/repository-task-worker test
          git diff --check

      - name: Commit ordinary candidate
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix(repository-task): retain schema-distinct failure artifacts'
          git push origin HEAD:feat/repository-task-worker
