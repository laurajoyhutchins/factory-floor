name: Runtime finalize repository-task dogfood

on:
  push:
    branches:
      - feat/repository-task-worker
    paths:
      - '.github/workflows/runtime-finalize-repository-task-dogfood.yml'

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feat/repository-task-worker
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'

      - name: Apply final runtime and dogfood corrections
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          source = Path('workers/repository-task-ts/src/index.ts')
          source_text = source.read_text()
          source_pattern = re.compile(
              r"    normalizedPlan: compiled\.normalizedPlan,\n"
              r"    generationGraph: compiled\.generationGraph,\n"
              r"    patch: \{ patch: '', patchDigest: null \},\n"
              r"    evidence:\n"
              r"      repositoryIdentity === undefined\n"
              r"        \? null\n"
              r"        : \{ repositoryIdentity, diagnostics \},"
          )
          source_replacement = """    normalizedPlan: compiled.normalizedPlan ?? {
              status: 'unavailable',
              phase,
              artifact: 'normalized-plan',
              diagnostics,
            },
            generationGraph: compiled.generationGraph ?? {
              status: 'unavailable',
              phase,
              artifact: 'generation-graph',
              diagnostics,
            },
            patch: { patch: '', patchDigest: null },
            evidence:
              repositoryIdentity === undefined
                ? {
                    status: 'unavailable',
                    phase,
                    artifact: 'evidence',
                    diagnostics,
                  }
                : { repositoryIdentity, diagnostics },"""
          source_text, count = source_pattern.subn(source_replacement, source_text, count=1)
          if count != 1:
              raise SystemExit(f'failure artifact replacement count was {count}')
          source.write_text(source_text)

          tests = Path('workers/repository-task-ts/test/index.test.ts')
          test_text = tests.read_text()
          test_marker = """    expect(workerContext.staged.at(-1)?.value).toMatchObject({
              status: 'failed',
              diagnostics: [{ code: 'markdown.invalid' }],
            });"""
          test_addition = test_marker + """
            expect(
              workerContext.staged.find(
                ({ portName }) => portName === 'normalized-plan',
              )?.value,
            ).toMatchObject({
              status: 'unavailable',
              artifact: 'normalized-plan',
            });
            expect(
              workerContext.staged.find(
                ({ portName }) => portName === 'generation-graph',
              )?.value,
            ).toMatchObject({
              status: 'unavailable',
              artifact: 'generation-graph',
            });
            expect(
              workerContext.staged.find(({ portName }) => portName === 'evidence')
                ?.value,
            ).toMatchObject({
              status: 'unavailable',
              artifact: 'evidence',
            });
            expect(
              new Set(
                workerContext.staged.map(({ value }) => JSON.stringify(value)),
              ).size,
            ).toBe(workerContext.staged.length);"""
          if test_marker not in test_text:
              raise SystemExit('failure artifact test marker not found')
          tests.write_text(test_text.replace(test_marker, test_addition, 1))

          dogfood = Path('examples/repository-task/run-dogfood.ts')
          text = dogfood.read_text()
          identity_function = """
          function repositoryIdentity(
            baseRevision: string,
            snapshot: { files: Record<string, string> },
          ) {
            const canonicalFiles = Object.keys(snapshot.files)
              .sort()
              .map((path) => [path, snapshot.files[path]] as const);
            return {
              repository: {
                owner: 'laurajoyhutchins',
                name: 'factory-floor',
              },
              baseRevision,
              snapshotDigest: sha256(JSON.stringify(canonicalFiles)),
              dirtyStatePolicy: 'require-clean' as const,
            };
          }
          """
          if 'function repositoryIdentity(' not in text:
              marker = 'function authoredPlan(baseRevision: string): string {'
              if marker not in text:
                  raise SystemExit('authoredPlan marker not found')
              text = text.replace(marker, identity_function + '\n' + marker, 1)

          setup_pattern = re.compile(
              r"    const baseRevision = git\('rev-parse', 'HEAD'\);\n"
              r"    const snapshot = await repositorySnapshot\(\);\n"
              r"    const profile = repositoryProfile\(\);"
          )
          text, setup_count = setup_pattern.subn(
              """    const baseRevision = git('rev-parse', 'HEAD');
              const snapshot = await repositorySnapshot();
              const identity = repositoryIdentity(baseRevision, snapshot);
              const profile = repositoryProfile();""",
              text,
              count=1,
          )
          if setup_count != 1 and 'const identity = repositoryIdentity(' not in text:
              raise SystemExit(f'identity setup replacement count was {setup_count}')

          success_pattern = re.compile(
              r"(idempotencyKey: `repository-task-success-\$\{baseRevision\}`,[\s\S]*?repositoryProfile: profile,\n\s*repositorySnapshot: snapshot,)(\n\s*})"
          )
          if 'repositoryIdentity: identity' not in text:
              text, success_count = success_pattern.subn(
                  r"\1\n        repositoryIdentity: identity,\2", text, count=1
              )
              if success_count != 1:
                  raise SystemExit(f'success identity replacement count was {success_count}')

          failure_pattern = re.compile(
              r"(idempotencyKey: `repository-task-failure-\$\{baseRevision\}`,[\s\S]*?repositoryProfile: profile,\n\s*repositorySnapshot: snapshot,)(\n\s*})"
          )
          if 'repositoryIdentity: repositoryIdentity(unavailableRevision, snapshot)' not in text:
              text, failure_count = failure_pattern.subn(
                  r"\1\n        repositoryIdentity: repositoryIdentity(unavailableRevision, snapshot),\2",
                  text,
                  count=1,
              )
              if failure_count != 1:
                  raise SystemExit(f'failure identity replacement count was {failure_count}')

          if 'const retainedIdentity = successEvidence.repositoryIdentity;' not in text:
              assertion_marker = """    if (
              sha256(successPatch) !== successArtifacts.patch.patchDigest ||"""
              if assertion_marker not in text:
                  raise SystemExit('identity assertion marker not found')
              assertion = """    const retainedIdentity = successEvidence.repositoryIdentity;
            if (
              retainedIdentity?.beforeExecution?.baseRevision !== baseRevision ||
              retainedIdentity?.afterExecution?.baseRevision !== baseRevision ||
              retainedIdentity?.beforeExecution?.snapshotDigest !== identity.snapshotDigest ||
              retainedIdentity?.afterExecution?.snapshotDigest !== identity.snapshotDigest
            ) {
              throw new Error(
                'retained repository identity does not match the submitted immutable identity',
              );
            }
            if (
              sha256(successPatch) !== successArtifacts.patch.patchDigest ||"""
              text = text.replace(assertion_marker, assertion, 1)

          text = text.replace(
              "failureCode !== 'executor.base-unavailable'",
              "failureCode !== 'worker.repository-identity-mismatch'",
              1,
          )
          if 'repositoryIdentity: retainedIdentity' not in text:
              summary_marker = '        treeDigest: successEvidence.treeDigest,\n'
              if summary_marker not in text:
                  raise SystemExit('proof summary marker not found')
              text = text.replace(
                  summary_marker,
                  summary_marker + '        repositoryIdentity: retainedIdentity,\n',
                  1,
              )
          dogfood.write_text(text)

          workflow = Path('.github/workflows/repository-task-dogfood.yml')
          workflow_text = workflow.read_text()
          step_name = '      - name: Prepare bounded committed-artifact wait candidate\n'
          if step_name in workflow_text:
              start = workflow_text.index(step_name)
              end = workflow_text.index('      - name: Set up Node.js\n', start)
              workflow_text = workflow_text[:start] + workflow_text[end:]
          workflow_text = workflow_text.replace(
              """      - name: Format bounded wait candidate
                run: pnpm exec prettier --write examples/repository-task/run-dogfood.ts

          """,
              '',
              1,
          )
          workflow.write_text(workflow_text)

          Path('.github/workflows/runtime-one-shot-dogfood-patch.yml').unlink(missing_ok=True)
          Path('.github/workflows/runtime-finalize-repository-task-dogfood.yml').unlink(missing_ok=True)
          PY

      - name: Bootstrap workspace
        run: bash scripts/bootstrap-workspace.sh

      - name: Format and run focused tests
        run: |
          pnpm exec prettier --write \
            workers/repository-task-ts/src/index.ts \
            workers/repository-task-ts/test/index.test.ts \
            examples/repository-task/run-dogfood.ts \
            .github/workflows/repository-task-dogfood.yml
          pnpm --filter @factory-floor/repository-task-worker test

      - name: Commit finalized candidate
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix(repository-task): retain schema-distinct failure artifacts'
          git push origin HEAD:feat/repository-task-worker
