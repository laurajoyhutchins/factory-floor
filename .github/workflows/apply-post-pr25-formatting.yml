name: Apply post-PR 25 formatting

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out formatting branch
        uses: actions/checkout@v4
        with:
          ref: fix/post-pr25-formatting

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.12.1 --activate
          pnpm --version

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: python -m pip install --disable-pip-version-check uv

      - name: Install locked dependencies
        run: |
          pnpm install --frozen-lockfile
          uv sync --project packages/contracts-py --locked
          uv sync --project packages/worker-sdk-py --locked

      - name: Apply canonical formatting
        run: |
          set -euo pipefail
          pnpm format
          rm .github/workflows/apply-post-pr25-formatting.yml
          git diff --name-only --diff-filter=ACMRT
          git diff --check

      - name: Verify formatting and daemon-independent gates
        run: |
          pnpm format:check
          pnpm lint
          pnpm typecheck
          pnpm test
          pnpm --filter @factory-floor/control-plane test
          pnpm test:python

      - name: Commit formatting-only changes
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "style: apply repository formatting"
          git push origin HEAD:fix/post-pr25-formatting
