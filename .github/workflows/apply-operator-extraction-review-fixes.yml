# Temporary branch-only review helper.
name: Apply operator extraction review fixes

on:
  push:
    branches:
      - feat/extract-operator-client-ui

permissions:
  contents: write

jobs:
  apply:
    if: >-
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.head_commit.message, 'complete reusable run inspection boundary')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feat/extract-operator-client-ui
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: pnpm
      - name: Bootstrap workspace
        run: |
          corepack enable
          pnpm install --frozen-lockfile
      - name: Apply review fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          client_path = Path('packages/operator-client-ts/src/index.ts')
          source = client_path.read_text()
          old = """const paths = {
            health: '/health',
            regions: '/api/v1/inspect/regions',
            events: '/api/v1/inspect/events',
            deliveries: '/api/v1/inspect/deliveries',
            executions: '/api/v1/inspect/executions',
            attempts: '/api/v1/inspect/attempts',
            artifacts: '/api/v1/inspect/artifacts',
            resources: '/api/v1/inspect/resources',
            policies: '/api/v1/inspect/policy-decisions',
            projections: '/api/v1/inspect/projections',
            topology: '/api/v1/inspect/topology',
            instantiations: '/api/v1/inspect/instantiations',
            stream: '/api/v1/inspect/stream',
            operator: '/api/v1/operator',
          } as const;

          export const readOnlyInspectionPaths = paths;
          """
          new = """const inspectionPaths = {
            health: '/health',
            regions: '/api/v1/inspect/regions',
            events: '/api/v1/inspect/events',
            deliveries: '/api/v1/inspect/deliveries',
            executions: '/api/v1/inspect/executions',
            attempts: '/api/v1/inspect/attempts',
            artifacts: '/api/v1/inspect/artifacts',
            resources: '/api/v1/inspect/resources',
            policies: '/api/v1/inspect/policy-decisions',
            projections: '/api/v1/inspect/projections',
            topology: '/api/v1/inspect/topology',
            instantiations: '/api/v1/inspect/instantiations',
            stream: '/api/v1/inspect/stream',
          } as const;
          const operatorPath = '/api/v1/operator';

          export const readOnlyInspectionPaths = inspectionPaths;
          """
          if old not in source:
              raise SystemExit('operator path block not found')
          source = source.replace(old, new)
          source = source.replace('paths.operator', 'operatorPath')
          source = source.replace('paths.', 'inspectionPaths.')
          client_path.write_text(source)

          ui_path = Path('packages/operator-ui-react/src/components/ui.tsx')
          ui = ui_path.read_text()
          needle = '          <NavLink to="/operations">Operations</NavLink>\n'
          replacement = needle + '          <NavLink to="/approvals">Approvals</NavLink>\n'
          if needle not in ui:
              raise SystemExit('operations navigation link not found')
          ui_path.write_text(ui.replace(needle, replacement, 1))
          PY
          pnpm exec prettier --write \
            apps/console/package.json \
            apps/console/src/main.tsx \
            packages/operator-client-ts/package.json \
            packages/operator-client-ts/src/index.ts \
            packages/operator-client-ts/src/index.test.ts \
            packages/operator-ui-react/package.json \
            packages/operator-ui-react/src/components/ui.tsx \
            packages/operator-ui-react/src/index.ts \
            packages/operator-ui-react/src/pages/run-operator.tsx \
            packages/operator-ui-react/src/pages/run-operator.test.tsx
      - name: Run focused verification
        run: |
          pnpm --filter @factory-floor/operator-client-ts typecheck
          pnpm --filter @factory-floor/operator-client-ts test
          pnpm --filter @factory-floor/operator-ui-react typecheck
          pnpm --filter @factory-floor/operator-ui-react test
          pnpm --filter @factory-floor/console build
      - name: Commit fixes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            apps/console/package.json \
            apps/console/src/main.tsx \
            packages/operator-client-ts/package.json \
            packages/operator-client-ts/src/index.ts \
            packages/operator-client-ts/src/index.test.ts \
            packages/operator-ui-react/package.json \
            packages/operator-ui-react/src/components/ui.tsx \
            packages/operator-ui-react/src/index.ts \
            packages/operator-ui-react/src/pages/run-operator.tsx \
            packages/operator-ui-react/src/pages/run-operator.test.tsx
          git diff --cached --quiet || git commit -m 'fix(operator): complete reusable run inspection boundary'
          git push origin HEAD:feat/extract-operator-client-ui
