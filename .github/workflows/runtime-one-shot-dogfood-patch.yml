# Requeued by Runtime Engineering after exact-head dogfood diagnosis.
name: Runtime one-shot dogfood patch

on:
  push:
    branches:
      - feat/repository-task-worker
    paths:
      - '.github/workflows/runtime-one-shot-dogfood-patch.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feat/repository-task-worker
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'

      - name: Bootstrap workspace
        run: bash scripts/bootstrap-workspace.sh

      - name: Apply immutable-identity dogfood changes
        run: |
          python - <<'PY'
          from pathlib import Path

          dogfood = Path('examples/repository-task/run-dogfood.ts')
          text = dogfood.read_text()

          snapshot_marker = """  };\n}\n\nfunction authoredPlan(baseRevision: string): string {"""
          snapshot_replacement = """  };\n}\n\nfunction repositoryIdentity(\n  baseRevision: string,\n  snapshot: { files: Record<string, string> },\n) {\n  const canonicalFiles = Object.keys(snapshot.files)\n    .sort()\n    .map((path) => [path, snapshot.files[path]] as const);\n  return {\n    repository: {\n      owner: 'laurajoyhutchins',\n      name: 'factory-floor',\n    },\n    baseRevision,\n    snapshotDigest: sha256(JSON.stringify(canonicalFiles)),\n    dirtyStatePolicy: 'require-clean' as const,\n  };\n}\n\nfunction authoredPlan(baseRevision: string): string {"""
          if snapshot_marker not in text:
              raise SystemExit('repository identity insertion marker not found')
          text = text.replace(snapshot_marker, snapshot_replacement, 1)

          start = text.index('async function outputArtifacts(')
          end = text.index('\nasync function writeJson(', start)
          output_replacement = """async function readCommittedJson(\n  blobStore: FilesystemArtifactBlobStore,\n  digest: string,\n): Promise<any> {\n  const deadline = Date.now() + 30_000;\n  for (;;) {\n    try {\n      return JSON.parse(await streamText(await blobStore.readCommitted(digest)));\n    } catch (error) {\n      const code = (error as { code?: unknown }).code;\n      if (code !== 'not_found' || Date.now() >= deadline) throw error;\n      await new Promise((resolve) => setTimeout(resolve, 50));\n    }\n  }\n}\n\nasync function outputArtifacts(\n  blobStore: FilesystemArtifactBlobStore,\n  state: Awaited<ReturnType<typeof runState>>,\n): Promise<Record<string, any>> {\n  return Object.fromEntries(\n    await Promise.all(\n      state.outputs.map(async (output) => [\n        output.port_name,\n        await readCommittedJson(blobStore, output.digest),\n      ]),\n    ),\n  );\n}\n"""
          text = text[:start] + output_replacement + text[end:]

          setup_marker = """    const baseRevision = git('rev-parse', 'HEAD');\n    const snapshot = await repositorySnapshot();\n    const profile = repositoryProfile();"""
          setup_replacement = """    const baseRevision = git('rev-parse', 'HEAD');\n    const snapshot = await repositorySnapshot();\n    const identity = repositoryIdentity(baseRevision, snapshot);\n    const profile = repositoryProfile();"""
          if setup_marker not in text:
              raise SystemExit('dogfood setup marker not found')
          text = text.replace(setup_marker, setup_replacement, 1)

          success_marker = """        repositoryProfile: profile,\n        repositorySnapshot: snapshot,\n      },\n      idempotencyKey: `repository-task-success-${baseRevision}`,"""
          success_replacement = """        repositoryProfile: profile,\n        repositorySnapshot: snapshot,\n        repositoryIdentity: identity,\n      },\n      idempotencyKey: `repository-task-success-${baseRevision}`,"""
          if success_marker not in text:
              raise SystemExit('success payload marker not found')
          text = text.replace(success_marker, success_replacement, 1)

          failure_marker = """        repositoryProfile: profile,\n        repositorySnapshot: snapshot,\n      },\n      idempotencyKey: `repository-task-failure-${baseRevision}`,"""
          failure_replacement = """        repositoryProfile: profile,\n        repositorySnapshot: snapshot,\n        repositoryIdentity: repositoryIdentity(unavailableRevision, snapshot),\n      },\n      idempotencyKey: `repository-task-failure-${baseRevision}`,"""
          if failure_marker not in text:
              raise SystemExit('failure payload marker not found')
          text = text.replace(failure_marker, failure_replacement, 1)

          status_marker = """    if (\n      sha256(successPatch) !== successArtifacts.patch.patchDigest ||"""
          status_replacement = """    const retainedIdentity = successEvidence.repositoryIdentity;\n    if (\n      retainedIdentity?.beforeExecution?.baseRevision !== baseRevision ||\n      retainedIdentity?.afterExecution?.baseRevision !== baseRevision ||\n      retainedIdentity?.beforeExecution?.snapshotDigest !==\n        identity.snapshotDigest ||\n      retainedIdentity?.afterExecution?.snapshotDigest !== identity.snapshotDigest\n    ) {\n      throw new Error('retained repository identity does not match the submitted immutable identity');\n    }\n    if (\n      sha256(successPatch) !== successArtifacts.patch.patchDigest ||"""
          if status_marker not in text:
              raise SystemExit('success identity assertion marker not found')
          text = text.replace(status_marker, status_replacement, 1)

          text = text.replace(
              "failureCode !== 'executor.base-unavailable'",
              "failureCode !== 'worker.repository-identity-mismatch'",
              1,
          )

          summary_marker = """        treeDigest: successEvidence.treeDigest,\n        mutationPaths: successEvidence.mutations.map("""
          summary_replacement = """        treeDigest: successEvidence.treeDigest,\n        repositoryIdentity: retainedIdentity,\n        mutationPaths: successEvidence.mutations.map("""
          if summary_marker not in text:
              raise SystemExit('summary identity marker not found')
          text = text.replace(summary_marker, summary_replacement, 1)
          dogfood.write_text(text)

          workflow = Path('.github/workflows/repository-task-dogfood.yml')
          workflow_text = workflow.read_text()
          patch_start = workflow_text.index(
              '      - name: Prepare bounded committed-artifact wait candidate\n'
          )
          patch_end = workflow_text.index('      - name: Set up Node.js\n', patch_start)
          workflow_text = workflow_text[:patch_start] + workflow_text[patch_end:]
          format_step = """      - name: Format bounded wait candidate\n        run: pnpm exec prettier --write examples/repository-task/run-dogfood.ts\n\n"""
          if format_step not in workflow_text:
              raise SystemExit('temporary format step not found')
          workflow_text = workflow_text.replace(format_step, '', 1)
          workflow.write_text(workflow_text)
          PY

      - name: Format patched files
        run: pnpm exec prettier --write examples/repository-task/run-dogfood.ts .github/workflows/repository-task-dogfood.yml

      - name: Commit dogfood changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add examples/repository-task/run-dogfood.ts .github/workflows/repository-task-dogfood.yml
          git commit -m 'test(repository-task): dogfood immutable invocation identity'
          git push origin HEAD:feat/repository-task-worker
