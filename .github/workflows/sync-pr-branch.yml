name: Sync pull request branch

on:
  workflow_dispatch:
    inputs:
      pull-request:
        description: Open pull request number to update from its base branch
        required: true
        type: number

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Safely sync same-repository branch
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Merge the current base into the pull request branch
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const marker = '<!-- agent-branch-sync:v1 -->';
            const pullNumber = Number(core.getInput('pull-request'));
            const { owner, repo } = context.repo;

            if (!Number.isSafeInteger(pullNumber) || pullNumber < 1) {
              core.setFailed('pull-request must be a positive integer.');
              return;
            }

            const { data: pull } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: pullNumber,
            });

            if (pull.state !== 'open') {
              core.setFailed(`Pull request #${pullNumber} is not open.`);
              return;
            }

            if (pull.head.repo?.full_name !== `${owner}/${repo}`) {
              core.setFailed('Branch sync is restricted to branches owned by this repository.');
              return;
            }

            if (pull.head.ref === pull.base.ref) {
              core.setFailed('The pull request head and base branches are identical.');
              return;
            }

            const upsertComment = async (body) => {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: pullNumber,
                per_page: 100,
              });
              const existing = comments.find((comment) => comment.body?.includes(marker));
              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: pullNumber,
                  body,
                });
              }
            };

            try {
              const response = await github.rest.repos.merge({
                owner,
                repo,
                base: pull.head.ref,
                head: pull.base.sha,
                commit_message: `chore: sync ${pull.base.ref} into ${pull.head.ref}`,
              });

              const status = response.status === 204 ? 'already current' : 'updated';
              const resultingSha = response.data?.sha ?? pull.head.sha;
              await upsertComment(`${marker}\n## Branch sync\n\n- Status: **${status}**\n- Base: \`${pull.base.ref}\` at \`${pull.base.sha}\`\n- Head: \`${pull.head.ref}\` at \`${resultingSha}\`\n- Force push: **not used**`);
              core.notice(`Pull request #${pullNumber} is ${status}.`);
            } catch (error) {
              if (error.status === 409) {
                await upsertComment(`${marker}\n## Branch sync\n\n- Status: **conflict**\n- Base: \`${pull.base.ref}\` at \`${pull.base.sha}\`\n- Head: \`${pull.head.ref}\` at \`${pull.head.sha}\`\n- Result: no branch update was made; resolve the conflict in an isolated checkout.`);
                core.setFailed('GitHub could not merge the base into the pull request branch without conflicts.');
                return;
              }
              throw error;
            }
