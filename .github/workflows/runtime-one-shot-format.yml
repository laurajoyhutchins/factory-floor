name: Runtime one-shot format

on:
  push:
    branches:
      - feat/repository-task-worker
    paths:
      - '.github/workflows/runtime-one-shot-format.yml'
      - 'workers/repository-task-ts/src/index.ts'
      - 'workers/repository-task-ts/test/index.test.ts'

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feat/repository-task-worker
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'

      - name: Bootstrap workspace
        run: bash scripts/bootstrap-workspace.sh

      - name: Format runtime worker files
        run: pnpm exec prettier --write workers/repository-task-ts/src/index.ts workers/repository-task-ts/test/index.test.ts

      - name: Commit formatted files
        run: |
          if git diff --quiet -- workers/repository-task-ts/src/index.ts workers/repository-task-ts/test/index.test.ts; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add workers/repository-task-ts/src/index.ts workers/repository-task-ts/test/index.test.ts
          git commit -m 'style(repository-task): format fail-closed worker changes'
          git push origin HEAD:feat/repository-task-worker
