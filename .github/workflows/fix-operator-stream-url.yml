name: Fix operator stream URL

on:
  push:
    branches:
      - feat/extract-operator-client-ui

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, 'fix(operator-ui): preserve injected stream origin')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - name: Apply stream URL fix and regression coverage
        run: |
          python - <<'PY'
          from pathlib import Path

          client = Path('packages/operator-client-ts/src/index.ts')
          source = client.read_text()
          source = source.replace(
              '    streamPath: paths.stream,',
              '    streamPath: targetUrl(baseUrl, paths.stream),',
          )
          client.write_text(source)

          hook = Path('packages/operator-ui-react/src/hooks/liveEvents.ts')
          source = hook.read_text().replace(
              '        const response = await fetch(url.pathname + url.search, {',
              '        const response = await fetch(url.toString(), {',
          )
          hook.write_text(source)

          test = Path('packages/operator-client-ts/src/index.test.ts')
          source = test.read_text()
          marker = "    await client.operatorStatus();\n\n"
          replacement = (
              "    await client.operatorStatus();\n\n"
              "    expect(client.streamPath).toBe(\n"
              "      'https://factory.example/api/v1/inspect/stream',\n"
              "    );\n"
          )
          if marker not in source:
              raise SystemExit('test insertion marker missing')
          test.write_text(source.replace(marker, replacement, 1))
          PY
          pnpm exec prettier --write packages/operator-client-ts/src/index.ts packages/operator-client-ts/src/index.test.ts packages/operator-ui-react/src/hooks/liveEvents.ts
      - name: Commit fix
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/operator-client-ts/src/index.ts packages/operator-client-ts/src/index.test.ts packages/operator-ui-react/src/hooks/liveEvents.ts
          git commit -m "fix(operator-ui): preserve injected stream origin"
          git push
