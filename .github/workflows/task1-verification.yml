name: Repository Verification

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: repository-verification-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.12.1 --activate
          pnpm --version

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: python -m pip install --disable-pip-version-check uv

      - name: Install locked dependencies
        run: |
          pnpm install --frozen-lockfile
          uv sync --project packages/contracts-py --locked
          uv sync --project packages/worker-sdk-py --locked

      - name: Verify workspace bootstrap
        run: bash scripts/bootstrap-workspace.sh

      - name: Validate contracts
        run: pnpm contracts:validate

      - name: Check generated contract drift
        run: pnpm contracts:check

      - name: Validate conformance ledger
        run: pnpm conformance:check

      - name: Lint
        run: |
          set -o pipefail
          pnpm lint 2>&1 | tee lint.log

      - name: Upload lint log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-log-${{ github.run_number }}
          path: lint.log
          if-no-files-found: ignore
          retention-days: 30

      - name: Typecheck
        run: |
          set -o pipefail
          pnpm typecheck 2>&1 | tee typecheck.log

      - name: Upload typecheck log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-log-${{ github.run_number }}
          path: typecheck.log
          if-no-files-found: ignore
          retention-days: 30

      - name: Run workspace TypeScript tests
        run: pnpm test

      - name: Run control-plane package tests
        run: pnpm --filter @factory-floor/control-plane test

      - name: Run Python tests
        run: pnpm test:python

      - name: Capture pinned formatter output
        run: |
          pnpm prettier --write \
            apps/console/src/api/client.ts \
            apps/console/src/components/ui.tsx \
            apps/console/src/hooks/liveEvents.ts \
            apps/console/src/hooks/liveEvents.test.ts \
            apps/console/src/main.tsx \
            apps/console/src/pages/pages.tsx \
            apps/console/src/pages/pages.test.tsx \
            apps/console/src/styles.css

      - name: Upload pinned formatter output
        uses: actions/upload-artifact@v4
        with:
          name: formatted-console-${{ github.run_number }}
          path: |
            apps/console/src/api/client.ts
            apps/console/src/components/ui.tsx
            apps/console/src/hooks/liveEvents.ts
            apps/console/src/hooks/liveEvents.test.ts
            apps/console/src/main.tsx
            apps/console/src/pages/pages.tsx
            apps/console/src/pages/pages.test.tsx
            apps/console/src/styles.css
          if-no-files-found: error
          retention-days: 7

      - name: Check formatting
        run: pnpm format:check

      - name: Validate Compose configuration
        run: docker compose config

      - name: Start development services
        run: pnpm services:up

      - name: Wait for PostgreSQL and MinIO health
        run: pnpm services:wait

      - name: Run database migrations
        env:
          DATABASE_URL: postgres://factory_floor:factory_floor_dev_password@127.0.0.1:5432/factory_floor
        run: pnpm db:migrate

      - name: Run integration test command
        env:
          TEST_DATABASE_URL: postgres://factory_floor:factory_floor_dev_password@127.0.0.1:5432/factory_floor
          DATABASE_URL: postgres://factory_floor:factory_floor_dev_password@127.0.0.1:5432/factory_floor
        run: |
          set -o pipefail
          pnpm test:integration 2>&1 | tee integration-test.log

      - name: Upload integration log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-log-${{ github.run_number }}
          path: integration-test.log
          if-no-files-found: ignore
          retention-days: 30

      - name: Run conformance-focused tests
        env:
          TEST_DATABASE_URL: postgres://factory_floor:factory_floor_dev_password@127.0.0.1:5432/factory_floor
          DATABASE_URL: postgres://factory_floor:factory_floor_dev_password@127.0.0.1:5432/factory_floor
        run: pnpm test:conformance

      - name: Verify migration reset against Compose PostgreSQL
        env:
          DATABASE_URL: postgres://factory_floor:factory_floor_dev_password@127.0.0.1:5432/factory_floor
          NODE_ENV: development
        run: pnpm --filter @factory-floor/db migrate reset

      - name: Run Milestone 1 live-restart acceptance
        env:
          TEST_DATABASE_URL: postgres://factory_floor:factory_floor_dev_password@127.0.0.1:5432/factory_floor
          DATABASE_URL: postgres://factory_floor:factory_floor_dev_password@127.0.0.1:5432/factory_floor
        run: |
          set -o pipefail
          pnpm test:acceptance 2>&1 | tee acceptance-test.log

      - name: Upload acceptance log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: acceptance-test-log-${{ github.run_number }}
          path: acceptance-test.log
          if-no-files-found: ignore
          retention-days: 30

      - name: Stop development services
        if: always()
        run: pnpm services:clean

  m1-acceptance:
    name: Milestone 1 clean acceptance
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out reviewed commit
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.12.1 --activate
          pnpm --version

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Milestone 1 acceptance from clean checkout
        env:
          TEST_DATABASE_URL: postgres://factory_floor:factory_floor_dev_password@127.0.0.1:5432/factory_floor
          DATABASE_URL: postgres://factory_floor:factory_floor_dev_password@127.0.0.1:5432/factory_floor
          ARTIFACT_STORE_ROOT: .factory-floor/demo-artifacts
          FACTORY_FLOOR_CLEAN_CHECKOUT: '1'
        run: |
          set -o pipefail
          pnpm accept:m1 2>&1 | tee m1-acceptance.log

      - name: Upload Milestone 1 evidence bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m1-acceptance-evidence-${{ github.run_number }}
          path: |
            .factory-floor/evidence/m1/
            m1-acceptance.log
          if-no-files-found: error
          retention-days: 30

      - name: Stop development services
        if: always()
        run: pnpm services:clean
