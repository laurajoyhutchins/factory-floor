name: Repository Verification

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: repository-verification-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.12.1 --activate
          pnpm --version

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: python -m pip install --disable-pip-version-check uv

      - name: Install locked dependencies
        run: |
          pnpm install --frozen-lockfile
          uv sync --project packages/contracts-py --locked
          uv sync --project packages/worker-sdk-py --locked

      - name: Verify workspace bootstrap
        run: bash scripts/bootstrap-workspace.sh

      - name: Validate contracts
        run: pnpm contracts:validate

      - name: Check generated contract drift
        run: pnpm contracts:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Run workspace TypeScript tests
        run: pnpm test

      - name: Run control-plane package tests
        run: pnpm --filter @factory-floor/control-plane test

      - name: Run Python tests
        run: uv run --project packages/worker-sdk-py --locked pytest

      - name: Validate Compose configuration
        run: docker compose config

      - name: Start development services
        run: docker compose up -d postgres minio

      - name: Wait for PostgreSQL and MinIO health
        shell: bash
        run: |
          set -euo pipefail
          postgres_id="$(docker compose ps -q postgres)"
          minio_id="$(docker compose ps -q minio)"

          for attempt in $(seq 1 60); do
            postgres_health="$(docker inspect --format '{{.State.Health.Status}}' "$postgres_id" 2>/dev/null || true)"
            minio_health="$(docker inspect --format '{{.State.Health.Status}}' "$minio_id" 2>/dev/null || true)"
            printf 'attempt %s: postgres=%s minio=%s\n' "$attempt" "$postgres_health" "$minio_health"

            if [[ "$postgres_health" == "healthy" && "$minio_health" == "healthy" ]]; then
              curl --fail --silent --show-error http://127.0.0.1:9000/minio/health/live >/dev/null
              docker compose ps
              exit 0
            fi

            sleep 2
          done

          docker compose ps
          docker compose logs --no-color postgres minio
          exit 1

      - name: Run integration test command
        shell: bash
        env:
          TEST_DATABASE_URL: postgres://factory_floor:factory_floor_dev_password@127.0.0.1:5432/factory_floor
          DATABASE_URL: postgres://factory_floor:factory_floor_dev_password@127.0.0.1:5432/factory_floor
        run: |
          set -o pipefail
          pnpm test:integration 2>&1 | tee integration.log

      - name: Upload integration diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr8-integration-log
          path: integration.log
          if-no-files-found: ignore

      - name: Verify migration reset against Compose PostgreSQL
        env:
          DATABASE_URL: postgres://factory_floor:factory_floor_dev_password@127.0.0.1:5432/factory_floor
          NODE_ENV: development
        run: pnpm --filter @factory-floor/db migrate reset

      - name: Stop development services
        if: always()
        run: docker compose down --volumes
