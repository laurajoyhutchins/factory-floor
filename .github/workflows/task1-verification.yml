name: Repository Verification

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: repository-verification-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.12.1 --activate
          pnpm --version

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: python -m pip install --disable-pip-version-check uv

      - name: Install locked dependencies
        run: |
          pnpm install --frozen-lockfile
          uv sync --project packages/contracts-py --locked
          uv sync --project packages/worker-sdk-py --locked

      - name: Verify workspace bootstrap
        run: bash scripts/bootstrap-workspace.sh

      - name: Validate contracts
        run: pnpm contracts:validate

      - name: Check generated contract drift
        run: pnpm contracts:check

      - name: Validate conformance ledger
        run: pnpm conformance:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Run workspace TypeScript tests
        run: pnpm test

      - name: Run control-plane package tests
        run: pnpm --filter @factory-floor/control-plane test

      - name: Run Python tests
        run: pnpm test:python

      - name: Validate Compose configuration
        run: docker compose config

      - name: Start development services
        run: pnpm services:up

      - name: Wait for PostgreSQL and MinIO health
        run: pnpm services:wait

      - name: Run database migrations
        env:
          DATABASE_URL: postgres://factory_floor:factory_floor_dev_password@127.0.0.1:5432/factory_floor
        run: pnpm db:migrate

      - name: Run integration test command
        env:
          TEST_DATABASE_URL: postgres://factory_floor:factory_floor_dev_password@127.0.0.1:5432/factory_floor
          DATABASE_URL: postgres://factory_floor:factory_floor_dev_password@127.0.0.1:5432/factory_floor
        run: |
          set -o pipefail
          pnpm test:integration 2>&1 | tee integration-test.log

      - name: Upload integration log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-log-${{ github.run_number }}
          path: integration-test.log
          if-no-files-found: ignore
          retention-days: 30

      - name: Run conformance-focused tests
        env:
          TEST_DATABASE_URL: postgres://factory_floor:factory_floor_dev_password@127.0.0.1:5432/factory_floor
          DATABASE_URL: postgres://factory_floor:factory_floor_dev_password@127.0.0.1:5432/factory_floor
        run: pnpm test:conformance

      - name: Verify migration reset against Compose PostgreSQL
        env:
          DATABASE_URL: postgres://factory_floor:factory_floor_dev_password@127.0.0.1:5432/factory_floor
          NODE_ENV: development
        run: pnpm --filter @factory-floor/db migrate reset

      - name: Run Milestone 1 live-restart acceptance
        env:
          TEST_DATABASE_URL: postgres://factory_floor:factory_floor_dev_password@127.0.0.1:5432/factory_floor
          DATABASE_URL: postgres://factory_floor:factory_floor_dev_password@127.0.0.1:5432/factory_floor
        run: |
          set -o pipefail
          pnpm test:acceptance 2>&1 | tee acceptance-test.log

      - name: Upload acceptance log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: acceptance-test-log-${{ github.run_number }}
          path: acceptance-test.log
          if-no-files-found: ignore
          retention-days: 30

      - name: Stop development services
        if: always()
        run: pnpm services:clean
