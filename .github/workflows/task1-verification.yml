name: Task 1 Verification

on:
  push:
    branches:
      - agent/m1-recovery
  pull_request:

permissions:
  contents: write

concurrency:
  group: task1-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.12.1 --activate
          pnpm --version

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: python -m pip install --disable-pip-version-check uv

      - name: Resolve locked dependencies
        run: |
          pnpm install --no-frozen-lockfile
          uv lock --project packages/worker-sdk-py
          uv sync --project packages/worker-sdk-py --locked

      - name: Verify workspace bootstrap
        run: bash scripts/bootstrap-workspace.sh

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Run workspace TypeScript tests
        run: pnpm test

      - name: Run control-plane package tests
        run: pnpm --filter @factory-floor/control-plane test

      - name: Run Python tests
        run: uv run --project packages/worker-sdk-py --locked pytest

      - name: Run integration test command
        run: pnpm test:integration

      - name: Validate Compose configuration
        run: docker compose config

      - name: Start development services
        run: docker compose up -d postgres minio

      - name: Wait for PostgreSQL and MinIO health
        shell: bash
        run: |
          set -euo pipefail
          postgres_id="$(docker compose ps -q postgres)"
          minio_id="$(docker compose ps -q minio)"

          for attempt in $(seq 1 60); do
            postgres_health="$(docker inspect --format '{{.State.Health.Status}}' "$postgres_id" 2>/dev/null || true)"
            minio_health="$(docker inspect --format '{{.State.Health.Status}}' "$minio_id" 2>/dev/null || true)"
            printf 'attempt %s: postgres=%s minio=%s\n' "$attempt" "$postgres_health" "$minio_health"

            if [[ "$postgres_health" == "healthy" && "$minio_health" == "healthy" ]]; then
              curl --fail --silent --show-error http://127.0.0.1:9000/minio/health/live >/dev/null
              docker compose ps
              exit 0
            fi

            sleep 2
          done

          docker compose ps
          docker compose logs --no-color postgres minio
          exit 1

      - name: Stop development services
        if: always()
        run: docker compose down --volumes

      - name: Commit generated verification state
        if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('docs/plans/2026-07-14-factory-floor-mvp.md')
          text = path.read_text()
          old = '- [ ] Verify `pnpm lint`, `pnpm typecheck`, `pnpm test`, and `uv run --project packages/worker-sdk-py pytest`.'
          new = '- [x] Verify `pnpm lint`, `pnpm typecheck`, `pnpm test`, and `uv run --project packages/worker-sdk-py pytest`.'
          if old in text:
              path.write_text(text.replace(old, new, 1))
          elif new not in text:
              raise SystemExit('Task 1 verification checklist entry was not found.')
          PY

          if git diff --quiet -- pnpm-lock.yaml packages/worker-sdk-py/uv.lock docs/plans/2026-07-14-factory-floor-mvp.md; then
            echo 'Generated verification state is already current.'
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add pnpm-lock.yaml packages/worker-sdk-py/uv.lock docs/plans/2026-07-14-factory-floor-mvp.md
          git commit -m 'chore: record Task 1 verification'
          git push
