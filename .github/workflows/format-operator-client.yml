name: Format operator client

on:
  push:
    branches:
      - feat/extract-operator-client-ui

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, 'style(operator-client)')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prettier --write packages/operator-client-ts/src/index.ts packages/operator-client-ts/src/index.test.ts
      - name: Commit canonical formatting
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/operator-client-ts/src/index.ts packages/operator-client-ts/src/index.test.ts
          git commit -m "style(operator-client): apply canonical formatting"
          git push
