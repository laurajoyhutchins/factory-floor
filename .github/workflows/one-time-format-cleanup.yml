name: One-time repository formatting diagnostics

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: one-time-repository-formatting
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out cleanup branch
        uses: actions/checkout@v4
        with:
          ref: agent/reduce-repository-tech-debt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.12.1 --activate

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: python -m pip install --disable-pip-version-check uv

      - name: Bootstrap locked dependencies
        run: bash scripts/bootstrap-workspace.sh

      - name: Capture formatting diagnostics
        run: |
          set +e
          pnpm format:check > prettier-check.log 2>&1
          echo $? > prettier-check.status
          pnpm exec prettier --list-different . > prettier-different.txt 2>&1
          git status --short > git-status.txt
          exit 0

      - name: Upload formatting diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: formatting-diagnostics-${{ github.run_number }}
          path: |
            prettier-check.log
            prettier-check.status
            prettier-different.txt
            git-status.txt
          if-no-files-found: error
          retention-days: 7

      - name: Check generated contract drift
        run: pnpm contracts:check

      - name: Run daemon-independent verification
        run: |
          pnpm lint
          pnpm typecheck
          pnpm test
          pnpm test:python
