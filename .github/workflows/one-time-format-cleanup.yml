name: Prepare permanent formatting guardrails

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: one-time-repository-formatting
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out cleanup branch
        uses: actions/checkout@v4
        with:
          ref: agent/reduce-repository-tech-debt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.12.1 --activate

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare permanent files
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from 'node:fs';

          const workflowPath = '.github/workflows/task1-verification.yml';
          let workflow = readFileSync(workflowPath, 'utf8');
          const marker = "      - name: Run Python tests\n        run: pnpm test:python\n";
          const formattingStep = "\n      - name: Check formatting\n        run: pnpm format:check\n";
          if (!workflow.includes('      - name: Check formatting')) {
            if (!workflow.includes(marker)) {
              throw new Error('Could not locate the Python test step');
            }
            workflow = workflow.replace(marker, `${marker}${formattingStep}`);
          }
          writeFileSync(workflowPath, workflow);

          const ignorePath = '.prettierignore';
          const ignore = readFileSync(ignorePath, 'utf8').replace(
            /\n# Workflow files are maintained[\s\S]*?\.github\/workflows\/\n/,
            '\n',
          );
          writeFileSync(ignorePath, ignore);
          NODE

          pnpm exec prettier --write --ignore-path /dev/null \
            .github/workflows/task1-verification.yml
          pnpm exec prettier --check --ignore-path /dev/null \
            .github/workflows/task1-verification.yml

      - name: Upload permanent files
        uses: actions/upload-artifact@v4
        with:
          name: permanent-formatting-guardrails-${{ github.run_number }}
          path: |
            .github/workflows/task1-verification.yml
            .prettierignore
          if-no-files-found: error
          retention-days: 7
