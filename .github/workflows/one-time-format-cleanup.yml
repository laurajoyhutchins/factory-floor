name: One-time repository formatting cleanup

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: one-time-repository-formatting
  cancel-in-progress: true

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out cleanup branch
        uses: actions/checkout@v4
        with:
          ref: agent/reduce-repository-tech-debt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.12.1 --activate

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: python -m pip install --disable-pip-version-check uv

      - name: Bootstrap locked dependencies
        run: bash scripts/bootstrap-workspace.sh

      - name: Add permanent format command
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from 'node:fs';

          const packagePath = 'package.json';
          const packageJson = JSON.parse(readFileSync(packagePath, 'utf8'));
          const scripts = {};
          for (const [name, command] of Object.entries(packageJson.scripts)) {
            if (name === 'format:check') {
              scripts.format = 'prettier --write .';
            }
            scripts[name] = command;
          }
          packageJson.scripts = scripts;
          writeFileSync(packagePath, `${JSON.stringify(packageJson, null, 2)}\n`);
          NODE

      - name: Format repository-owned files
        run: pnpm exec prettier --write .

      - name: Create local cleanup commit
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "chore: clear repository formatting debt"

      - name: Push cleanup commit
        run: git push origin HEAD:agent/reduce-repository-tech-debt

      - name: Check formatting
        run: pnpm format:check

      - name: Check generated contract drift
        run: pnpm contracts:check

      - name: Run daemon-independent verification
        run: |
          pnpm lint
          pnpm typecheck
          pnpm test
          pnpm test:python
