name: One-time repository formatting stabilization

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: one-time-repository-formatting
  cancel-in-progress: true

jobs:
  stabilize:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out cleanup branch
        uses: actions/checkout@v4
        with:
          ref: agent/reduce-repository-tech-debt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.12.1 --activate

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: python -m pip install --disable-pip-version-check uv

      - name: Bootstrap locked dependencies
        run: bash scripts/bootstrap-workspace.sh

      - name: Stabilize remaining formatting
        run: |
          pnpm exec prettier --write \
            apps/control-plane/src/routes/registrations.ts \
            apps/control-plane/src/routes/systems.ts \
            packages/runtime-core/src/registration/registration-service.ts

      - name: Commit and push stabilization
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            apps/control-plane/src/routes/registrations.ts \
            apps/control-plane/src/routes/systems.ts \
            packages/runtime-core/src/registration/registration-service.ts
          git commit -m "chore: stabilize Prettier output"
          git push origin HEAD:agent/reduce-repository-tech-debt

      - name: Check formatting
        run: pnpm format:check

      - name: Check generated contract drift
        run: pnpm contracts:check

      - name: Run daemon-independent verification
        run: |
          pnpm lint
          pnpm typecheck
          pnpm test
          pnpm test:python
