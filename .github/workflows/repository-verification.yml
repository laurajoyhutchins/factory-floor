name: Repository Verification

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  CONTROL_PLANE_OPERATOR_TOKEN: factory_floor_ci_operator_token
  CONTROL_PLANE_ADMIN_TOKEN: factory_floor_ci_admin_token
  WORKER_API_BEARER_TOKEN: factory_floor_ci_worker_token
  FACTORY_FLOOR_WORKER_TOKEN: factory_floor_ci_worker_token
  FACTORY_FLOOR_WORKER_ID: demo-worker
  FACTORY_FLOOR_WORKER_COMPONENT_SELECTORS: retrieve@1,compare@1,synthesize@1,verify@1
  WORKER_AUTHORIZATION_JSON: '{"demo-worker":{"token":"factory_floor_ci_worker_token","capabilities":["retrieve@1","compare@1","synthesize@1","verify@1"]},"demo-ts-worker":{"token":"factory_floor_ci_worker_token","capabilities":["retrieve@1","compare@1","synthesize@1"]},"demo-py-worker":{"token":"factory_floor_ci_worker_token","capabilities":["verify@1"]},"acceptance-ts-worker":{"token":"factory_floor_ci_worker_token","capabilities":["retrieve@1","compare@1","synthesize@1"]},"acceptance-py-worker":{"token":"factory_floor_ci_worker_token","capabilities":["verify@1"]}}'
  VITE_FACTORY_FLOOR_OPERATOR_TOKEN: factory_floor_ci_operator_token

concurrency:
  group: repository-verification-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-verification:
    name: Fast repository verification
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'

      - name: Activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.12.1 --activate
          pnpm --version

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'

      - name: Install uv
        run: python -m pip install --disable-pip-version-check uv

      - name: Install locked dependencies
        run: |
          pnpm install --frozen-lockfile
          uv sync --project packages/contracts-py --locked
          uv sync --project packages/worker-sdk-py --locked

      - name: Verify workspace bootstrap
        run: bash scripts/bootstrap-workspace.sh

      - name: Run canonical static verification
        env:
          FACTORY_FLOOR_FORMAT_DIAGNOSTICS: '1'
        run: node scripts/run-ci-stage.mjs --stage static --output .factory-floor/ci-metrics/static.json -- bash -c 'set -o pipefail; pnpm verify:static 2>&1 | tee fast-static.log'

      - name: Run canonical unit verification
        run: node scripts/run-ci-stage.mjs --stage unit --output .factory-floor/ci-metrics/unit.json -- bash -c 'set -o pipefail; pnpm verify:unit 2>&1 | tee unit-verification.log'

      - name: Summarize fast verification metrics
        if: always()
        run: node scripts/summarize-ci-metrics.mjs --metrics .factory-floor/ci-metrics --tests .factory-floor/test-results --output .factory-floor/ci-metrics/summary.json >> "$GITHUB_STEP_SUMMARY"

      - name: Write agent CI handoff
        if: always()
        env:
          AGENT_CI_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          AGENT_CI_JOB_STATUS: ${{ job.status }}
        run: node scripts/write-agent-ci-summary.mjs --manifest .github/agent-ci-manifest.json --output .factory-floor/ci-metrics/agent-ci-summary.json --job fast-verification --artifact fast-verification-${{ github.run_number }} >> "$GITHUB_STEP_SUMMARY"

      - name: Upload fast verification evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: fast-verification-${{ github.run_number }}
          path: |
            .factory-floor/ci-metrics/
            .factory-floor/test-results/
            fast-static.log
            unit-verification.log
            format.log
            formatted-files.txt
            formatted-files.tar.gz
          if-no-files-found: ignore
          retention-days: 30

  service-verification:
    name: Docker-backed repository verification
    needs: fast-verification
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DATABASE_URL: postgres://factory_floor:factory_floor_dev_password@127.0.0.1:5432/factory_floor
      TEST_DATABASE_URL: postgres://factory_floor:factory_floor_dev_password@127.0.0.1:5432/factory_floor

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'

      - name: Activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.12.1 --activate
          pnpm --version

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'

      - name: Install uv
        run: python -m pip install --disable-pip-version-check uv

      - name: Install locked dependencies
        run: |
          pnpm install --frozen-lockfile
          uv sync --project packages/contracts-py --locked
          uv sync --project packages/worker-sdk-py --locked

      - name: Verify workspace bootstrap
        run: bash scripts/bootstrap-workspace.sh

      - name: Start services and run migrations
        run: node scripts/run-ci-stage.mjs --stage services --output .factory-floor/ci-metrics/services.json -- bash -c 'set -o pipefail; pnpm verify:services 2>&1 | tee services-verification.log'

      - name: Run canonical integration verification
        run: node scripts/run-ci-stage.mjs --stage integration --output .factory-floor/ci-metrics/integration.json -- bash -c 'set -o pipefail; pnpm verify:integration 2>&1 | tee integration-verification.log'

      - name: Run canonical live-restart acceptance
        run: node scripts/run-ci-stage.mjs --stage acceptance --output .factory-floor/ci-metrics/acceptance.json -- bash -c 'set -o pipefail; pnpm verify:acceptance 2>&1 | tee acceptance-verification.log'

      - name: Stop development services
        if: always()
        run: pnpm services:clean

      - name: Summarize Docker-backed verification metrics
        if: always()
        run: node scripts/summarize-ci-metrics.mjs --metrics .factory-floor/ci-metrics --tests .factory-floor/test-results --output .factory-floor/ci-metrics/summary.json >> "$GITHUB_STEP_SUMMARY"

      - name: Write agent CI handoff
        if: always()
        env:
          AGENT_CI_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          AGENT_CI_JOB_STATUS: ${{ job.status }}
        run: node scripts/write-agent-ci-summary.mjs --manifest .github/agent-ci-manifest.json --output .factory-floor/ci-metrics/agent-ci-summary.json --job service-verification --artifact service-verification-${{ github.run_number }} >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Docker-backed verification evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: service-verification-${{ github.run_number }}
          path: |
            .factory-floor/ci-metrics/
            .factory-floor/test-results/
            services-verification.log
            integration-verification.log
            acceptance-verification.log
          if-no-files-found: ignore
          retention-days: 30

  m1-acceptance:
    name: Milestone 1 clean acceptance
    needs: service-verification
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out reviewed commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'

      - name: Activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.12.1 --activate
          pnpm --version

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'

      - name: Run Milestone 1 acceptance from clean checkout
        env:
          TEST_DATABASE_URL: postgres://factory_floor:factory_floor_dev_password@127.0.0.1:5432/factory_floor
          DATABASE_URL: postgres://factory_floor:factory_floor_dev_password@127.0.0.1:5432/factory_floor
          ARTIFACT_STORE_ROOT: .factory-floor/demo-artifacts
          FACTORY_FLOOR_CLEAN_CHECKOUT: '1'
        run: node scripts/run-ci-stage.mjs --stage m1-clean-acceptance --output .factory-floor/ci-metrics/m1-clean-acceptance.json -- bash -c 'set -o pipefail; pnpm accept:m1 2>&1 | tee m1-acceptance.log'

      - name: Stop development services
        if: always()
        run: pnpm services:clean

      - name: Summarize clean acceptance metrics
        if: always()
        run: node scripts/summarize-ci-metrics.mjs --metrics .factory-floor/ci-metrics --tests .factory-floor/test-results --output .factory-floor/ci-metrics/summary.json >> "$GITHUB_STEP_SUMMARY"

      - name: Write agent CI handoff
        if: always()
        env:
          AGENT_CI_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          AGENT_CI_JOB_STATUS: ${{ job.status }}
        run: node scripts/write-agent-ci-summary.mjs --manifest .github/agent-ci-manifest.json --output .factory-floor/ci-metrics/agent-ci-summary.json --job m1-acceptance --artifact m1-acceptance-evidence-${{ github.run_number }} >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Milestone 1 evidence bundle
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: m1-acceptance-evidence-${{ github.run_number }}
          path: |
            .factory-floor/ci-metrics/
            .factory-floor/test-results/
            .factory-floor/evidence/m1/
            m1-acceptance.log
          if-no-files-found: error
          retention-days: 30
