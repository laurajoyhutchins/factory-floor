name: Repository Verification

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  CONTROL_PLANE_OPERATOR_TOKEN: factory_floor_ci_operator_token
  CONTROL_PLANE_ADMIN_TOKEN: factory_floor_ci_admin_token
  WORKER_API_BEARER_TOKEN: factory_floor_ci_worker_token
  FACTORY_FLOOR_WORKER_TOKEN: factory_floor_ci_worker_token
  FACTORY_FLOOR_WORKER_ID: demo-worker
  FACTORY_FLOOR_WORKER_COMPONENT_SELECTORS: retrieve@1,compare@1,synthesize@1,verify@1
  WORKER_AUTHORIZATION_JSON: '{"demo-worker":{"token":"factory_floor_ci_worker_token","capabilities":["retrieve@1","compare@1","synthesize@1","verify@1"]},"demo-ts-worker":{"token":"factory_floor_ci_worker_token","capabilities":["retrieve@1","compare@1","synthesize@1"]},"demo-py-worker":{"token":"factory_floor_ci_worker_token","capabilities":["verify@1"]},"acceptance-ts-worker":{"token":"factory_floor_ci_worker_token","capabilities":["retrieve@1","compare@1","synthesize@1"]},"acceptance-py-worker":{"token":"factory_floor_ci_worker_token","capabilities":["verify@1"]}}'
  VITE_FACTORY_FLOOR_OPERATOR_TOKEN: factory_floor_ci_operator_token

concurrency:
  group: repository-verification-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-verification:
    name: Fast repository verification
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        id: checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Node.js
        id: setup-node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'

      - name: Activate pnpm
        id: activate-pnpm
        run: |
          set -o pipefail
          { corepack enable && corepack prepare pnpm@10.12.1 --activate && pnpm --version; } 2>&1 | tee activate-pnpm.log

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'

      - name: Install uv
        id: install-uv
        run: |
          set -o pipefail
          python -m pip install --disable-pip-version-check uv 2>&1 | tee install-uv.log

      - name: Install locked dependencies
        id: install-dependencies
        run: |
          set -o pipefail
          { pnpm install --frozen-lockfile && uv sync --project packages/contracts-py --locked && uv sync --project packages/worker-sdk-py --locked; } 2>&1 | tee install-dependencies.log

      - name: Verify workspace bootstrap
        id: bootstrap
        run: |
          set -o pipefail
          bash scripts/bootstrap-workspace.sh 2>&1 | tee bootstrap.log

      - name: Run canonical static verification
        id: static
        env:
          FACTORY_FLOOR_FORMAT_DIAGNOSTICS: '1'
        run: node scripts/run-ci-stage.mjs --stage static --output .factory-floor/ci-metrics/static.json -- bash -c 'set -o pipefail; pnpm verify:static 2>&1 | tee fast-static.log'

      - name: Run canonical unit verification
        id: unit
        run: node scripts/run-ci-stage.mjs --stage unit --output .factory-floor/ci-metrics/unit.json -- bash -c 'set -o pipefail; pnpm verify:unit 2>&1 | tee unit-verification.log'

      - name: Summarize fast verification metrics
        id: metrics-summary
        if: always()
        run: |
          set -o pipefail
          node scripts/summarize-ci-metrics.mjs --metrics .factory-floor/ci-metrics --tests .factory-floor/test-results --output .factory-floor/ci-metrics/summary.json 2>&1 | tee metrics-summary.log >> "$GITHUB_STEP_SUMMARY"

      - name: Upload fast verification evidence
        id: evidence-upload
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: fast-verification-${{ github.run_number }}
          path: |
            .factory-floor/ci-metrics/
            .factory-floor/test-results/
            activate-pnpm.log
            install-uv.log
            install-dependencies.log
            bootstrap.log
            fast-static.log
            unit-verification.log
            metrics-summary.log
            format.log
            formatted-files.txt
            formatted-files.tar.gz
          if-no-files-found: ignore
          retention-days: 30

      - name: Write agent CI handoff
        id: agent-summary
        if: always()
        env:
          AGENT_CI_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          AGENT_CI_JOB_STATUS: ${{ job.status == 'success' && steps.evidence-upload.outcome == 'success' && 'success' || 'failure' }}
          AGENT_CI_FAILURE_STEP: ${{ steps.setup-node.outcome == 'failure' && 'setup-node' || steps.activate-pnpm.outcome == 'failure' && 'activate-pnpm' || steps.setup-python.outcome == 'failure' && 'setup-python' || steps.install-uv.outcome == 'failure' && 'install-uv' || steps.install-dependencies.outcome == 'failure' && 'install-dependencies' || steps.bootstrap.outcome == 'failure' && 'bootstrap' || steps.metrics-summary.outcome == 'failure' && 'metrics-summary' || steps.evidence-upload.outcome == 'failure' && 'artifact-upload' || '' }}
          AGENT_CI_FAILURE_COMMAND: ${{ steps.setup-node.outcome == 'failure' && 'rerun Repository Verification' || steps.activate-pnpm.outcome == 'failure' && 'corepack prepare pnpm@10.12.1 --activate' || steps.setup-python.outcome == 'failure' && 'rerun Repository Verification' || steps.install-uv.outcome == 'failure' && 'python -m pip install --disable-pip-version-check uv' || steps.install-dependencies.outcome == 'failure' && 'pnpm install --frozen-lockfile' || steps.bootstrap.outcome == 'failure' && 'bash scripts/bootstrap-workspace.sh' || steps.metrics-summary.outcome == 'failure' && 'node scripts/summarize-ci-metrics.mjs' || steps.evidence-upload.outcome == 'failure' && 'rerun Repository Verification artifact upload' || '' }}
          AGENT_CI_FAILURE_LOG: ${{ steps.activate-pnpm.outcome == 'failure' && 'activate-pnpm.log' || steps.install-uv.outcome == 'failure' && 'install-uv.log' || steps.install-dependencies.outcome == 'failure' && 'install-dependencies.log' || steps.bootstrap.outcome == 'failure' && 'bootstrap.log' || steps.metrics-summary.outcome == 'failure' && 'metrics-summary.log' || '' }}
        run: node scripts/write-agent-ci-summary.mjs --manifest .github/agent-ci-manifest.json --output .factory-floor/ci-metrics/agent-ci-summary.json --job fast-verification --artifact fast-verification-${{ github.run_number }} >> "$GITHUB_STEP_SUMMARY"

      - name: Upload fast agent handoff
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: agent-ci-handoff-fast-${{ github.run_number }}
          path: .factory-floor/ci-metrics/agent-ci-summary.json
          if-no-files-found: error
          retention-days: 30

      - name: Enforce fast evidence publication
        if: always() && steps.evidence-upload.outcome == 'failure'
        run: exit 1

  service-verification:
    name: Docker-backed repository verification
    needs: fast-verification
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DATABASE_URL: postgres://factory_floor:factory_floor_dev_password@127.0.0.1:5432/factory_floor
      TEST_DATABASE_URL: postgres://factory_floor:factory_floor_dev_password@127.0.0.1:5432/factory_floor

    steps:
      - name: Check out repository
        id: checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Node.js
        id: setup-node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'

      - name: Activate pnpm
        id: activate-pnpm
        run: |
          set -o pipefail
          { corepack enable && corepack prepare pnpm@10.12.1 --activate && pnpm --version; } 2>&1 | tee activate-pnpm.log

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'

      - name: Install uv
        id: install-uv
        run: |
          set -o pipefail
          python -m pip install --disable-pip-version-check uv 2>&1 | tee install-uv.log

      - name: Install locked dependencies
        id: install-dependencies
        run: |
          set -o pipefail
          { pnpm install --frozen-lockfile && uv sync --project packages/contracts-py --locked && uv sync --project packages/worker-sdk-py --locked; } 2>&1 | tee install-dependencies.log

      - name: Verify workspace bootstrap
        id: bootstrap
        run: |
          set -o pipefail
          bash scripts/bootstrap-workspace.sh 2>&1 | tee bootstrap.log

      - name: Start services and run migrations
        id: services
        run: node scripts/run-ci-stage.mjs --stage services --output .factory-floor/ci-metrics/services.json -- bash -c 'set -o pipefail; pnpm verify:services 2>&1 | tee services-verification.log'

      - name: Run canonical integration verification
        id: integration
        run: node scripts/run-ci-stage.mjs --stage integration --output .factory-floor/ci-metrics/integration.json -- bash -c 'set -o pipefail; pnpm verify:integration 2>&1 | tee integration-verification.log'

      - name: Run canonical live-restart acceptance
        id: acceptance
        run: node scripts/run-ci-stage.mjs --stage acceptance --output .factory-floor/ci-metrics/acceptance.json -- bash -c 'set -o pipefail; pnpm verify:acceptance 2>&1 | tee acceptance-verification.log'

      - name: Stop development services
        id: cleanup
        if: always()
        run: |
          set -o pipefail
          pnpm services:clean 2>&1 | tee cleanup.log

      - name: Summarize Docker-backed verification metrics
        id: metrics-summary
        if: always()
        run: |
          set -o pipefail
          node scripts/summarize-ci-metrics.mjs --metrics .factory-floor/ci-metrics --tests .factory-floor/test-results --output .factory-floor/ci-metrics/summary.json 2>&1 | tee metrics-summary.log >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Docker-backed verification evidence
        id: evidence-upload
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: service-verification-${{ github.run_number }}
          path: |
            .factory-floor/ci-metrics/
            .factory-floor/test-results/
            activate-pnpm.log
            install-uv.log
            install-dependencies.log
            bootstrap.log
            services-verification.log
            integration-verification.log
            acceptance-verification.log
            cleanup.log
            metrics-summary.log
          if-no-files-found: ignore
          retention-days: 30

      - name: Write agent CI handoff
        id: agent-summary
        if: always()
        env:
          AGENT_CI_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          AGENT_CI_JOB_STATUS: ${{ job.status == 'success' && steps.evidence-upload.outcome == 'success' && 'success' || 'failure' }}
          AGENT_CI_FAILURE_STEP: ${{ steps.setup-node.outcome == 'failure' && 'setup-node' || steps.activate-pnpm.outcome == 'failure' && 'activate-pnpm' || steps.setup-python.outcome == 'failure' && 'setup-python' || steps.install-uv.outcome == 'failure' && 'install-uv' || steps.install-dependencies.outcome == 'failure' && 'install-dependencies' || steps.bootstrap.outcome == 'failure' && 'bootstrap' || steps.cleanup.outcome == 'failure' && 'cleanup' || steps.metrics-summary.outcome == 'failure' && 'metrics-summary' || steps.evidence-upload.outcome == 'failure' && 'artifact-upload' || '' }}
          AGENT_CI_FAILURE_COMMAND: ${{ steps.setup-node.outcome == 'failure' && 'rerun Repository Verification' || steps.activate-pnpm.outcome == 'failure' && 'corepack prepare pnpm@10.12.1 --activate' || steps.setup-python.outcome == 'failure' && 'rerun Repository Verification' || steps.install-uv.outcome == 'failure' && 'python -m pip install --disable-pip-version-check uv' || steps.install-dependencies.outcome == 'failure' && 'pnpm install --frozen-lockfile' || steps.bootstrap.outcome == 'failure' && 'bash scripts/bootstrap-workspace.sh' || steps.cleanup.outcome == 'failure' && 'pnpm services:clean' || steps.metrics-summary.outcome == 'failure' && 'node scripts/summarize-ci-metrics.mjs' || steps.evidence-upload.outcome == 'failure' && 'rerun Repository Verification artifact upload' || '' }}
          AGENT_CI_FAILURE_LOG: ${{ steps.activate-pnpm.outcome == 'failure' && 'activate-pnpm.log' || steps.install-uv.outcome == 'failure' && 'install-uv.log' || steps.install-dependencies.outcome == 'failure' && 'install-dependencies.log' || steps.bootstrap.outcome == 'failure' && 'bootstrap.log' || steps.cleanup.outcome == 'failure' && 'cleanup.log' || steps.metrics-summary.outcome == 'failure' && 'metrics-summary.log' || '' }}
        run: node scripts/write-agent-ci-summary.mjs --manifest .github/agent-ci-manifest.json --output .factory-floor/ci-metrics/agent-ci-summary.json --job service-verification --artifact service-verification-${{ github.run_number }} >> "$GITHUB_STEP_SUMMARY"

      - name: Upload service agent handoff
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: agent-ci-handoff-service-${{ github.run_number }}
          path: .factory-floor/ci-metrics/agent-ci-summary.json
          if-no-files-found: error
          retention-days: 30

      - name: Enforce service evidence publication
        if: always() && steps.evidence-upload.outcome == 'failure'
        run: exit 1

  m1-acceptance:
    name: Milestone 1 clean acceptance
    needs: service-verification
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out reviewed commit
        id: checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Node.js
        id: setup-node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'

      - name: Activate pnpm
        id: activate-pnpm
        run: |
          set -o pipefail
          { corepack enable && corepack prepare pnpm@10.12.1 --activate && pnpm --version; } 2>&1 | tee activate-pnpm.log

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'

      - name: Run Milestone 1 acceptance from clean checkout
        id: m1-clean-acceptance
        env:
          TEST_DATABASE_URL: postgres://factory_floor:factory_floor_dev_password@127.0.0.1:5432/factory_floor
          DATABASE_URL: postgres://factory_floor:factory_floor_dev_password@127.0.0.1:5432/factory_floor
          ARTIFACT_STORE_ROOT: .factory-floor/demo-artifacts
          FACTORY_FLOOR_CLEAN_CHECKOUT: '1'
        run: node scripts/run-ci-stage.mjs --stage m1-clean-acceptance --output .factory-floor/ci-metrics/m1-clean-acceptance.json -- bash -c 'set -o pipefail; pnpm accept:m1 2>&1 | tee m1-acceptance.log'

      - name: Stop development services
        id: cleanup
        if: always()
        run: |
          set -o pipefail
          pnpm services:clean 2>&1 | tee cleanup.log

      - name: Summarize clean acceptance metrics
        id: metrics-summary
        if: always()
        run: |
          set -o pipefail
          node scripts/summarize-ci-metrics.mjs --metrics .factory-floor/ci-metrics --tests .factory-floor/test-results --output .factory-floor/ci-metrics/summary.json 2>&1 | tee metrics-summary.log >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Milestone 1 evidence bundle
        id: evidence-upload
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: m1-acceptance-evidence-${{ github.run_number }}
          path: |
            .factory-floor/ci-metrics/
            .factory-floor/test-results/
            .factory-floor/evidence/m1/
            activate-pnpm.log
            m1-acceptance.log
            cleanup.log
            metrics-summary.log
          if-no-files-found: error
          retention-days: 30

      - name: Write agent CI handoff
        id: agent-summary
        if: always()
        env:
          AGENT_CI_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          AGENT_CI_JOB_STATUS: ${{ job.status == 'success' && steps.evidence-upload.outcome == 'success' && 'success' || 'failure' }}
          AGENT_CI_FAILURE_STEP: ${{ steps.setup-node.outcome == 'failure' && 'setup-node' || steps.activate-pnpm.outcome == 'failure' && 'activate-pnpm' || steps.setup-python.outcome == 'failure' && 'setup-python' || steps.cleanup.outcome == 'failure' && 'cleanup' || steps.metrics-summary.outcome == 'failure' && 'metrics-summary' || steps.evidence-upload.outcome == 'failure' && 'artifact-upload' || '' }}
          AGENT_CI_FAILURE_COMMAND: ${{ steps.setup-node.outcome == 'failure' && 'rerun Repository Verification' || steps.activate-pnpm.outcome == 'failure' && 'corepack prepare pnpm@10.12.1 --activate' || steps.setup-python.outcome == 'failure' && 'rerun Repository Verification' || steps.cleanup.outcome == 'failure' && 'pnpm services:clean' || steps.metrics-summary.outcome == 'failure' && 'node scripts/summarize-ci-metrics.mjs' || steps.evidence-upload.outcome == 'failure' && 'rerun Repository Verification artifact upload' || '' }}
          AGENT_CI_FAILURE_LOG: ${{ steps.activate-pnpm.outcome == 'failure' && 'activate-pnpm.log' || steps.cleanup.outcome == 'failure' && 'cleanup.log' || steps.metrics-summary.outcome == 'failure' && 'metrics-summary.log' || '' }}
        run: node scripts/write-agent-ci-summary.mjs --manifest .github/agent-ci-manifest.json --output .factory-floor/ci-metrics/agent-ci-summary.json --job m1-acceptance --artifact m1-acceptance-evidence-${{ github.run_number }} >> "$GITHUB_STEP_SUMMARY"

      - name: Upload M1 agent handoff
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: agent-ci-handoff-m1-${{ github.run_number }}
          path: .factory-floor/ci-metrics/agent-ci-summary.json
          if-no-files-found: error
          retention-days: 30

      - name: Enforce M1 evidence publication
        if: always() && steps.evidence-upload.outcome == 'failure'
        run: exit 1
