name: Repository Verification

on:
  pull_request:

permissions:
  contents: write

concurrency:
  group: discord-activity-preparation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  prepare-discord-activity:
    if: >-
      github.event.pull_request.head.ref == 'feat/discord-activity-readonly-shell' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out feature branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feat/discord-activity-readonly-shell
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'

      - name: Compose Activity runtime and host
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('apps/control-plane/src/app.ts')
          source = path.read_text()
          source = source.replace(
              "import { ActivitySessionService } from './activity-session-service.js';\nimport { registerActivityRoutes } from './routes/activity.js';",
              "import { ActivitySessionService } from './activity-session-service.js';\nimport { DatabaseActivitySessionAuthorizer } from './activity-session-read-authorizer.js';\nimport { registerActivityRoutes } from './routes/activity.js';\nimport { registerActivityBrowserRoutes } from './routes/activity-browser.js';",
              1,
          )
          source = source.replace(
              "  if (deps.controlPlaneSecurity)\n    registerControlPlaneSecurity(app, deps.controlPlaneSecurity);\n  app.get('/health'",
              "  app.get('/health'",
              1,
          )
          database = """  const db =
    deps.database ??
    (process.env.DATABASE_URL
      ? createDatabase(process.env.DATABASE_URL)
      : undefined);
"""
          if 'const activitySessionAuthorizer = db' not in source:
              source = source.replace(
                  database,
                  database + """  const activitySessionService = db
    ? new ActivitySessionService(db)
    : undefined;
  const activitySessionAuthorizer = db
    ? new DatabaseActivitySessionAuthorizer(db)
    : undefined;
  if (deps.controlPlaneSecurity)
    registerControlPlaneSecurity(
      app,
      deps.controlPlaneSecurity,
      activitySessionAuthorizer,
    );
""",
                  1,
              )
          old = """  if (deps.serviceAuthKeys && db) {
    const serviceAuthConfig: ServiceAuthConfig = {
      keys: deps.serviceAuthKeys,
      db: createNonceRepository(db),
    };
    registerServiceAuth(app, serviceAuthConfig);
    await registerActivityRoutes(app, new ActivitySessionService(db));
  }
"""
          new = """  if (
    deps.serviceAuthKeys &&
    db &&
    activitySessionService &&
    activitySessionAuthorizer
  ) {
    const serviceAuthConfig: ServiceAuthConfig = {
      keys: deps.serviceAuthKeys,
      db: createNonceRepository(db),
    };
    registerServiceAuth(app, serviceAuthConfig);
    await registerActivityRoutes(app, activitySessionService);
    await registerActivityBrowserRoutes(
      app,
      activitySessionService,
      activitySessionAuthorizer,
    );
  }
"""
          if old in source:
              source = source.replace(old, new, 1)
          required = (
              "import { DatabaseActivitySessionAuthorizer }",
              "import { registerActivityBrowserRoutes }",
              'activitySessionAuthorizer',
          )
          if not all(item in source for item in required):
              raise SystemExit('activity composition incomplete')
          path.write_text(source)

          app_path = Path('apps/discord-activity/src/app.tsx')
          app = app_path.read_text().replace(
              'useRef<ActivitySessionController>();',
              'useRef<ActivitySessionController | undefined>(undefined);',
              1,
          )
          app_path.write_text(app)

          env_path = Path('.env.example')
          env = env_path.read_text()
          marker = '# Discord Activity browser host (disabled by default)'
          if marker not in env:
              env += """

# Discord Activity browser host (disabled by default)
VITE_FACTORY_FLOOR_DISCORD_ACTIVITY_ENABLED=false
VITE_DISCORD_CLIENT_ID=
VITE_FACTORY_FLOOR_BROKER_URL=https://broker.example
VITE_FACTORY_FLOOR_CONTROL_PLANE_URL=https://factory-floor.example
VITE_DISCORD_OAUTH_REDIRECT_URI=https://your-application-id.discordsays.com/.proxy/oauth/callback
"""
          env_path.write_text(env)
          PY

      - name: Generate canonical lockfile and formatting
        run: |
          corepack prepare pnpm@10.12.1 --activate
          corepack enable
          pnpm install --lockfile-only
          pnpm exec prettier --write \
            .env.example package.json pnpm-lock.yaml tsconfig.json vitest.config.ts scripts/verify.sh \
            apps/control-plane/src/app.ts apps/control-plane/src/security.ts \
            apps/control-plane/src/activity-session-read-authorizer.ts \
            apps/control-plane/src/routes/activity-browser.ts \
            apps/control-plane/test/security.test.ts \
            apps/control-plane/test/activity-browser-routes.test.ts \
            apps/discord-activity

      - name: Restore permanent workflow and frozen bootstrap
        run: |
          git fetch origin main --depth=1
          git checkout origin/main -- \
            .github/workflows/repository-verification.yml \
            scripts/bootstrap-workspace.sh
          rm -f \
            .github/activity-composition-trigger.txt \
            .github/workflows/apply-discord-activity-composition.yml \
            .github/workflows/publish-discord-activity-composition.yml \
            .github/workflows/prepare-discord-activity-pr.yml

      - name: Commit prepared branch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --quiet || git commit -m 'chore(discord-activity): prepare embedded shell for verification'
          git push origin HEAD:feat/discord-activity-readonly-shell
