name: Bootstrap repository-task worker branch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: bootstrap-repository-task-worker-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: pnpm install --no-frozen-lockfile
      - run: >-
          pnpm exec prettier --write
          tsconfig.json
          workers/repository-task-ts/package.json
          workers/repository-task-ts/tsconfig.json
          workers/repository-task-ts/src/index.ts
          workers/repository-task-ts/test/index.test.ts
      - uses: actions/upload-artifact@v4
        with:
          name: repository-task-worker-bootstrap
          path: |
            pnpm-lock.yaml
            tsconfig.json
            workers/repository-task-ts/package.json
            workers/repository-task-ts/tsconfig.json
            workers/repository-task-ts/src/index.ts
            workers/repository-task-ts/test/index.test.ts
          if-no-files-found: error
