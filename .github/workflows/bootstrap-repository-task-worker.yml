name: Bootstrap repository-task worker branch

on:
  push:
    branches:
      - feat/repository-task-worker

permissions:
  contents: write

concurrency:
  group: bootstrap-repository-task-worker
  cancel-in-progress: true

jobs:
  bootstrap:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/repository-task-worker
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: pnpm install --lockfile-only
      - run: >-
          pnpm exec prettier --write
          tsconfig.json
          workers/repository-task-ts/package.json
          workers/repository-task-ts/tsconfig.json
          workers/repository-task-ts/src/index.ts
          workers/repository-task-ts/test/index.test.ts
      - name: Commit retained bootstrap output
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add pnpm-lock.yaml tsconfig.json workers/repository-task-ts
          git commit -m "chore: retain repository-task worker bootstrap output"
          git push origin HEAD:feat/repository-task-worker
