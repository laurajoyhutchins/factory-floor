name: Temporary operator lockfile update

on:
  pull_request:

permissions:
  contents: write

jobs:
  update-lockfile:
    if: github.head_ref == 'refactor/extract-operator-packages'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: refactor/extract-operator-packages
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'

      - name: Activate pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.12.1 --activate

      - name: Regenerate lockfile importers
        run: pnpm install --lockfile-only --no-frozen-lockfile

      - name: Commit lockfile
        run: |
          if git diff --quiet -- pnpm-lock.yaml; then
            echo 'Lockfile already current.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add pnpm-lock.yaml
          git commit -m 'chore: update operator package lockfile'
          git push origin HEAD:refactor/extract-operator-packages
