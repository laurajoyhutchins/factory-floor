name: Format repository-task worker branch

on:
  push:
    branches:
      - feat/repository-task-worker

permissions:
  contents: write

concurrency:
  group: format-repository-task-worker
  cancel-in-progress: true

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feat/repository-task-worker
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prettier --write examples/repository-task/run-dogfood.ts
      - name: Commit retained formatter output
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add examples/repository-task/run-dogfood.ts
          git commit -m "style(repository-task): apply retained formatter output"
          git push origin HEAD:feat/repository-task-worker
