name: Format external action recovery

on:
  push:
    branches:
      - agent/external-action-recovery

permissions:
  contents: write

concurrency:
  group: format-external-action-recovery
  cancel-in-progress: true

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/external-action-recovery

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'

      - name: Install workspace
        run: |
          corepack prepare pnpm@10.12.1 --activate
          corepack enable
          pnpm install --frozen-lockfile

      - name: Format changed files
        run: |
          pnpm exec prettier --write \
            packages/runtime-core/src/external-actions/external-action-service.ts \
            tests/integration/runtime-core/external-action-recovery.test.ts

      - name: Commit formatting
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            packages/runtime-core/src/external-actions/external-action-service.ts \
            tests/integration/runtime-core/external-action-recovery.test.ts
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'style: format external action recovery'
          git push origin HEAD:agent/external-action-recovery
